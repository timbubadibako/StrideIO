<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>StrideIO - Map Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ffb4ab",
                        "on-primary": "#003739",
                        "tertiary-fixed-dim": "#e7c427",
                        "error-container": "#93000a",
                        "tertiary": "#fff9f0",
                        "on-surface-variant": "#b9caca",
                        "secondary": "#dfb7ff",
                        "on-tertiary": "#3a3000",
                        "primary-container": "#00f5ff",
                        "on-secondary-fixed": "#2d004f",
                        "surface-container-highest": "#353439",
                        "inverse-primary": "#00696e",
                        "on-secondary-fixed-variant": "#6b00b0",
                        "primary-fixed-dim": "#00dce5",
                        "surface-bright": "#39393d",
                        "on-primary-fixed-variant": "#004f53",
                        "inverse-on-surface": "#303034",
                        "surface-container": "#1f1f23",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-tertiary-fixed": "#221b00",
                        "secondary-fixed-dim": "#dfb7ff",
                        "on-secondary": "#4b007e",
                        "secondary-container": "#9d05ff",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#ffe16c",
                        "on-tertiary-container": "#736000",
                        "background": "#131317",
                        "on-secondary-container": "#f7e6ff",
                        "surface": "#131317",
                        "on-primary-fixed": "#002021",
                        "surface-container-lowest": "#0e0e12",
                        "primary": "#e9feff",
                        "inverse-surface": "#e4e1e7",
                        "on-primary-container": "#006c71",
                        "surface-tint": "#00dce5",
                        "outline-variant": "#3a494a",
                        "surface-variant": "#353439",
                        "surface-dim": "#131317",
                        "primary-fixed": "#63f7ff",
                        "surface-container-high": "#2a2a2e",
                        "on-surface": "#e4e1e7",
                        "secondary-fixed": "#f1daff",
                        "outline": "#849495",
                        "tertiary-container": "#ffdb3f",
                        "on-error": "#690005",
                        "surface-container-low": "#1b1b1f",
                        "on-background": "#e4e1e7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xl": "40px",
                        "sm": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "xs": "4px",
                        "xxl": "80px"
                    },
                    "fontFamily": {
                        "metric-xl": ["Space Grotesk"],
                        "body-lg": ["Inter"],
                        "label-bold": ["Space Grotesk"],
                        "body-md": ["Inter"],
                        "display-xl": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "metric-xl": ["48px", { "lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-bold": ["14px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-xl": ["72px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .cyber-grid {
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .hex-grid {
            background-color: transparent;
            background-image:
                linear-gradient(30deg, rgba(0, 245, 255, 0.02) 12%, transparent 12.5%, transparent 87%, rgba(0, 245, 255, 0.02) 87.5%, rgba(0, 245, 255, 0.02)),
                linear-gradient(150deg, rgba(0, 245, 255, 0.02) 12%, transparent 12.5%, transparent 87%, rgba(0, 245, 255, 0.02) 87.5%, rgba(0, 245, 255, 0.02)),
                linear-gradient(30deg, rgba(0, 245, 255, 0.02) 12%, transparent 12.5%, transparent 87%, rgba(0, 245, 255, 0.02) 87.5%, rgba(0, 245, 255, 0.02)),
                linear-gradient(150deg, rgba(0, 245, 255, 0.02) 12%, transparent 12.5%, transparent 87%, rgba(0, 245, 255, 0.02) 87.5%, rgba(0, 245, 255, 0.02)),
                linear-gradient(60deg, rgba(0, 245, 255, 0.05) 25%, transparent 25.5%, transparent 75%, rgba(0, 245, 255, 0.05) 75%, rgba(0, 245, 255, 0.05)),
                linear-gradient(60deg, rgba(0, 245, 255, 0.05) 25%, transparent 25.5%, transparent 75%, rgba(0, 245, 255, 0.05) 75%, rgba(0, 245, 255, 0.05));
            background-size: 40px 70px;
            background-position: 0 0, 0 0, 20px 35px, 20px 35px, 0 0, 20px 35px;
        }

        .neon-glow-primary {
            box-shadow: 0 0 16px rgba(0, 245, 255, 0.5);
        }

        .neon-glow-active {
            box-shadow: 0 0 24px rgba(0, 245, 255, 0.8), inset 0 0 8px rgba(0, 245, 255, 0.3);
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(53, 52, 57, 0.4) 0%, rgba(31, 31, 35, 0.6) 100%);
            backdrop-filter: blur(12px);
            border: 1px solid transparent;
            border-image: linear-gradient(to bottom right, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0)) 1;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background text-on-background h-screen w-full overflow-hidden relative font-body-md selection:bg-primary-container selection:text-on-primary-container">
    <!-- LAYER 0: Map Background -->
    <div class="absolute inset-0 z-0 bg-surface-container-lowest">
        <!-- Generative Map Image -->
        <img alt="Map Base"
            class="w-full h-full object-cover opacity-60 mix-blend-luminosity grayscale-[0.8] contrast-125"
            data-alt="A highly detailed, top-down satellite style map of a dense urban metropolis rendered in a dark-mode cyberpunk aesthetic. The map features deep black and charcoal greys for terrain and buildings, illuminated by glowing, high-contrast neon cyan and electric purple lines mapping the road networks. The lighting mimics a digital HUD interface, creating a precise, immersive, and high-performance gaming atmosphere. The visual style is sharp, data-driven, and slightly distressed with a digital noise overlay."
            data-location="Kuningan, Jakarta"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxUoysffj_XbNROVEPQz1kWlnS1jMbV7A448WuOE8zt9pzk7gFut96V-pR_1Tz0dSmzB2kFlrWzf67kXyBgY23YrGeFENEtnI9c6PQVVmikinHQYi9XvO08-aER0U2xGAc-_-hgtEEL5bxUK9yBIxJb0PodZcjxk2t2N19-IcoAhyLQVDpXRIciZG_GdKtCa7EIQT4sTCqKZr0OHsx1tbVRvzT3iOLpQUIPgwpzrUaIqDx_N7X_JwWTaMk9QcbIPrH_v8jj-z63bQ" />
        <!-- Cyber Grid Overlays -->
        <div class="absolute inset-0 cyber-grid z-0 mix-blend-screen pointer-events-none"></div>
        <div class="absolute inset-0 hex-grid z-0 mix-blend-screen pointer-events-none opacity-50"></div>
        <!-- Gradient Vignette -->
        <div
            class="absolute inset-0 bg-[radial-gradient(ellipse_at_center,transparent_0%,rgba(19,19,23,0.8)_100%)] z-0 pointer-events-none">
        </div>
    </div>
    <!-- LAYER 1: Top Shell (TopAppBar & Telemetry) -->
    <div class="absolute top-0 left-0 w-full z-40 flex flex-col pointer-events-none">
        <!-- Shared Component: TopAppBar -->
        <header
            class="bg-zinc-950/80 backdrop-blur-xl docked full-width top-0 border-b border-cyan-500/20 shadow-[0_0_20px_rgba(0,245,255,0.15)] flex justify-between items-center px-6 py-4 w-full pointer-events-auto">
            <button
                class="text-cyan-400 hover:text-cyan-300 transition-all duration-150 active:scale-95 transition-transform flex items-center justify-center h-10 w-10">
                <span class="material-symbols-outlined text-[24px]">location_on</span>
            </button>
            <h1
                class="text-cyan-400 font-black italic tracking-tighter font-space-grotesk font-bold uppercase tracking-widest text-[20px] drop-shadow-[0_0_8px_rgba(0,245,255,0.6)]">
                STRIDEIO
            </h1>
            <button
                class="text-cyan-400 hover:text-cyan-300 transition-all duration-150 active:scale-95 transition-transform flex items-center justify-center h-10 w-10">
                <span class="material-symbols-outlined text-[24px]">leaderboard</span>
            </button>
        </header>
        <!-- Secondary Telemetry Bar -->
        <div class="w-full px-4 pt-4 pointer-events-auto max-w-5xl mx-auto">
            <div
                class="glass-panel rounded-xl p-3 flex flex-col md:flex-row gap-4 justify-between items-center shadow-lg border-t border-l border-white/5">
                <!-- Region Info -->
                <div class="flex items-center gap-2 px-2">
                    <span class="material-symbols-outlined text-primary-container text-[18px]">share_location</span>
                    <span class="font-label-bold text-label-bold text-on-surface uppercase tracking-widest">Kuningan,
                        W-JAVA</span>
                </div>
                <!-- Level Progress -->
                <div
                    class="flex-1 w-full md:max-w-md flex items-center gap-4 px-2 border-y md:border-y-0 md:border-x border-white/5 py-2 md:py-0">
                    <span class="font-metric-xl text-[20px] text-primary-container leading-none">42</span>
                    <div class="flex-1 h-1.5 bg-surface-container-highest rounded-full overflow-hidden">
                        <div class="h-full bg-primary-container w-[68%] shadow-[0_0_10px_rgba(0,245,255,0.8)]"></div>
                    </div>
                    <span class="font-label-bold text-[10px] text-on-surface-variant uppercase">34k/50k XP</span>
                </div>
                <!-- Faction Balance -->
                <div class="flex flex-col gap-1 w-full md:w-48 px-2">
                    <div class="flex justify-between items-center w-full">
                        <span class="font-label-bold text-[10px] text-on-surface-variant uppercase">Zone Control</span>
                        <span class="material-symbols-outlined text-[14px] text-outline">query_stats</span>
                    </div>
                    <div class="w-full h-1.5 rounded-full overflow-hidden flex">
                        <div class="h-full bg-error w-[45%]"></div>
                        <div class="h-full bg-primary-container w-[35%]"></div>
                        <div class="h-full bg-tertiary-container w-[20%]"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- LAYER 2: Map Canvas Elements -->
    <!-- Central User Icon (Conqueror) -->
    <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center justify-center pointer-events-auto">
        <div class="relative flex items-center justify-center w-16 h-16">
            <!-- Pulsing Rings -->
            <div
                class="absolute inset-0 rounded-full border border-primary-container opacity-20 animate-[ping_3s_cubic-bezier(0,0,0.2,1)_infinite]">
            </div>
            <div
                class="absolute inset-2 rounded-full border border-primary-container opacity-40 animate-[ping_2s_cubic-bezier(0,0,0.2,1)_infinite_0.5s]">
            </div>
            <!-- Core Icon -->
            <div
                class="w-12 h-12 bg-surface-container-lowest rounded-full flex items-center justify-center z-10 neon-glow-active border border-primary-container">
                <span class="material-symbols-outlined text-primary-container text-[28px]"
                    style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
            </div>
        </div>
        <div class="mt-2 glass-panel px-3 py-1 rounded-full border border-white/10 flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-primary-container shadow-[0_0_8px_rgba(0,245,255,0.8)]"></div>
            <span class="font-label-bold text-[10px] text-on-surface uppercase tracking-widest">Scanning...</span>
        </div>
    </div>
    <!-- Left Widget: Active Party -->
    <div
        class="hidden md:flex absolute top-1/3 left-lg z-30 flex-col gap-2 pointer-events-auto w-16 group transition-all duration-300 hover:w-48">
        <div
            class="glass-panel rounded-full p-1.5 flex flex-col items-center gap-3 border border-white/10 relative overflow-hidden h-auto">
            <div
                class="w-12 h-12 rounded-full bg-surface-container-highest border border-outline flex items-center justify-center shrink-0">
                <span class="material-symbols-outlined text-on-surface-variant text-[20px]">group_add</span>
            </div>
            <!-- Avatar 1 -->
            <div
                class="w-12 h-12 rounded-full border-2 border-primary-container shrink-0 relative overflow-hidden group-hover:neon-glow-primary transition-shadow">
                <img alt="Party Member" class="w-full h-full object-cover grayscale"
                    data-alt="A close-up portrait of a female cyber-athlete with glowing neon-blue cybernetic implants on her jawline. The lighting is dark and moody, punctuated by high-contrast cyan light illuminating her face from below. She has an intense, focused expression. The background is pure dark mode black to isolate the high-tech aesthetic."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuD51PpDDDZQoeUUlKt8jrS1zZFf0HQ8U4a74hf-7Fwl_sgaxOi9FclkLyun8GErk_C3SVMe1pG_2DENXLeZuaZ-1OWxQDOQ1pwoE7o_iF-V8jU9VZB8IFG9V4atJ2DoHZoMhiq85rWpdqKeLUBMFstp_oNZvSGCgTgjaHxVUBp9Aoj7KOVhuXW6g0UpBY9rJG3h9FqECqJpPZ3HRiNeRNbMKlhnYRO_hKu9-Ri2L3iR0yLIcCTA81cRB3M5D333x4qazA5XzqF8TIU" />
                <div class="absolute bottom-0 right-0 w-3 h-3 bg-primary-container rounded-full border border-surface">
                </div>
            </div>
            <!-- Avatar 2 -->
            <div class="w-12 h-12 rounded-full border-2 border-error shrink-0 relative overflow-hidden">
                <img alt="Party Member" class="w-full h-full object-cover grayscale"
                    data-alt="A tight profile shot of a male gamer wearing a high-tech matte black visor that emits a faint red glow. The scene is shrouded in shadows with aggressive crimson backlighting defining his silhouette. The aesthetic is gritty, competitive, and firmly rooted in a dark-mode cyberpunk gaming universe."
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuAIB_fyy4QUt2mFSuHsc81zh9d9qYmdA8UDRm3P74-ib-CdeElZ0cYtqjg8bNvV18VcO8NUPuOgFzAG6ZZXoC8nhXnMldm5NJSKxyJeXAnEVJzik_b0nrUV-2InFPz1JXq1GhrtweE_m-kXi0NIVl278tRHKklKmwrK25C0bM6ulU5axVylpNLIQSzTTHTZOeCoLMOH_7FxPepRXGaChPSmrz0-k49vYmdStsQ84HccBBgSLbg9ZHIYDV0g1y7BSppcHEukYwJUiv8" />
            </div>
            <!-- Label expanded -->
            <div
                class="absolute left-16 top-0 bottom-0 flex flex-col justify-center opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap pl-2 pointer-events-none">
                <span class="font-label-bold text-label-bold text-primary-container uppercase">Echo Squad</span>
                <span class="font-body-md text-[12px] text-on-surface-variant">3/4 Online</span>
            </div>
        </div>
    </div>
    <!-- Right Widget: Mini Leaderboard -->
    <div class="hidden md:flex absolute top-1/3 right-lg z-30 flex-col pointer-events-auto w-64">
        <div class="glass-panel rounded-xl p-4 border border-white/10 flex flex-col gap-3">
            <div class="flex items-center justify-between border-b border-white/10 pb-2">
                <span
                    class="font-label-bold text-[12px] text-on-surface uppercase tracking-widest flex items-center gap-2">
                    <span class="material-symbols-outlined text-[16px] text-tertiary-container">military_tech</span>
                    Top Agents
                </span>
                <span class="font-label-bold text-[10px] text-primary-container">LOCAL</span>
            </div>
            <div class="flex flex-col gap-3">
                <!-- Rank 1 -->
                <div class="flex items-center gap-3">
                    <span class="font-metric-xl text-[16px] text-tertiary-container w-4 text-center">1</span>
                    <div
                        class="w-8 h-8 rounded-sm bg-surface-container-highest border border-tertiary-container/30 overflow-hidden">
                        <img alt="Avatar" class="w-full h-full object-cover opacity-80"
                            data-alt="A monochrome avatar portrait of a mysterious user wearing a stylized geometric mask. The aesthetic is sharp, high-contrast black and white, suitable for a minimalist dark-mode dashboard. There is a subtle, glowing golden-yellow border framing the portrait, signifying elite status."
                            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBJpMUFS6MTDYdRxUjCgTtEGayzilzB0GH5KIEa9MENMYcabP6CxxhsVKoZSIe_Kvl8VSOKc5KV5Zh4jiGZ9I3D2CfkNgwGti9z2eD7jG6-GSMO8k3fthHpHv-X1nXgwQH-23l47RyPq-yPsXBsF4V_pCfysfhguWaATJnL2xCpRSNzMIDO6W5gBy-mihFkgb0fCozT75-2_c1qxdEbwUvBlDKRiOQm3tzlHiD8ggpi0rPzNyuHieihjqcqql7kFS2SGQPXzTx7V6M" />
                    </div>
                    <div class="flex flex-col flex-1">
                        <span class="font-label-bold text-[12px] text-on-surface">V3X_NIGHT</span>
                        <span class="font-body-md text-[10px] text-on-surface-variant">14.2k pts</span>
                    </div>
                </div>
                <!-- Rank 2 -->
                <div class="flex items-center gap-3 opacity-80">
                    <span class="font-metric-xl text-[16px] text-on-surface-variant w-4 text-center">2</span>
                    <div class="w-8 h-8 rounded-sm bg-surface-container-highest border border-white/10 overflow-hidden">
                        <div
                            class="w-full h-full bg-surface flex items-center justify-center text-primary-container font-label-bold">
                            Z</div>
                    </div>
                    <div class="flex flex-col flex-1">
                        <span class="font-label-bold text-[12px] text-on-surface">ZERO_DAY</span>
                        <span class="font-body-md text-[10px] text-on-surface-variant">12.8k pts</span>
                    </div>
                </div>
                <!-- Rank 3 -->
                <div class="flex items-center gap-3 opacity-60">
                    <span class="font-metric-xl text-[16px] text-on-surface-variant w-4 text-center">3</span>
                    <div class="w-8 h-8 rounded-sm bg-surface-container-highest border border-white/10 overflow-hidden">
                        <div
                            class="w-full h-full bg-surface flex items-center justify-center text-error font-label-bold">
                            K</div>
                    </div>
                    <div class="flex flex-col flex-1">
                        <span class="font-label-bold text-[12px] text-on-surface">KRYPT0</span>
                        <span class="font-body-md text-[10px] text-on-surface-variant">11.1k pts</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- LAYER 3: Action & Navigation (Bottom) -->
    <!-- Floating Action Button (FAB) -->
    <div class="absolute bottom-[90px] md:bottom-lg left-1/2 -translate-x-1/2 z-40 pointer-events-auto">
        <button
            class="w-[88px] h-[88px] rounded-full bg-primary-container text-on-primary-container flex flex-col items-center justify-center shadow-[0_0_30px_rgba(0,245,255,0.6)] border border-primary-fixed hover:scale-105 active:scale-95 transition-all duration-200 group relative overflow-hidden">
            <!-- Inner hex subtle texture -->
            <div
                class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4IiBoZWlnaHQ9IjgiPjxwYXRoIGQ9Ik00IDBMMCAydjRsNCAyIDQtMi0uMDFWTDQgMHoiIGZpbGw9InJnYmEoMCwgMzIsIDMzLCAwLjIpIi8+PC9zdmc+')] opacity-20">
            </div>
            <span class="material-symbols-outlined text-[32px] group-hover:animate-pulse z-10"
                style="font-variation-settings: 'FILL' 1;">play_arrow</span>
            <span class="font-label-bold text-[14px] uppercase tracking-widest mt-1 z-10">Start</span>
        </button>
    </div>
    <!-- Shared Component: BottomNavBar (Mobile Only as per guidelines) -->
    <nav
        class="bg-zinc-950/90 backdrop-blur-md fixed bottom-0 w-full border-t border-cyan-500/40 rounded-t-xl shadow-[0_-10px_30px_rgba(0,245,255,0.1)] left-0 z-50 flex justify-around items-center pb-6 pt-3 px-4 md:hidden">
        <!-- Tab: Map (Active) -->
        <button
            class="flex flex-col items-center text-cyan-400 drop-shadow-[0_0_10px_rgba(0,245,255,0.8)] active:scale-90 transition-all duration-150 hover:opacity-100">
            <span class="material-symbols-outlined text-[24px]"
                style="font-variation-settings: 'FILL' 1;">explore</span>
            <span class="font-space-grotesk text-[10px] font-bold uppercase tracking-tighter mt-1">Map</span>
        </button>
        <!-- Tab: Social (Inactive) -->
        <button
            class="flex flex-col items-center text-zinc-600 opacity-60 active:scale-90 transition-all duration-150 hover:opacity-100">
            <span class="material-symbols-outlined text-[24px]">groups</span>
            <span class="font-space-grotesk text-[10px] font-bold uppercase tracking-tighter mt-1">Social</span>
        </button>
        <!-- Tab: Profile (Inactive) -->
        <button
            class="flex flex-col items-center text-zinc-600 opacity-60 active:scale-90 transition-all duration-150 hover:opacity-100">
            <span class="material-symbols-outlined text-[24px]">person</span>
            <span class="font-space-grotesk text-[10px] font-bold uppercase tracking-tighter mt-1">Profile</span>
        </button>
    </nav>
</body>

</html>
