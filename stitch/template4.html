<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-primary": "#00696e",
                        "secondary": "#dfb7ff",
                        "background": "#131317",
                        "on-error-container": "#ffdad6",
                        "surface-bright": "#39393d",
                        "on-background": "#e4e1e7",
                        "inverse-on-surface": "#303034",
                        "surface-container-highest": "#353439",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-tertiary": "#3a3000",
                        "tertiary-fixed": "#ffe16c",
                        "on-primary-fixed-variant": "#004f53",
                        "surface-dim": "#131317",
                        "on-tertiary-fixed": "#221b00",
                        "on-primary-container": "#006c71",
                        "on-error": "#690005",
                        "error-container": "#93000a",
                        "tertiary-fixed-dim": "#e7c427",
                        "inverse-surface": "#e4e1e7",
                        "tertiary-container": "#ffdb3f",
                        "surface-container": "#1f1f23",
                        "secondary-fixed": "#f1daff",
                        "primary-fixed": "#63f7ff",
                        "primary-container": "#00f5ff",
                        "on-surface": "#e4e1e7",
                        "secondary-fixed-dim": "#dfb7ff",
                        "on-secondary-container": "#f7e6ff",
                        "primary": "#e9feff",
                        "on-surface-variant": "#b9caca",
                        "on-secondary": "#4b007e",
                        "surface": "#131317",
                        "outline-variant": "#3a494a",
                        "on-secondary-fixed": "#2d004f",
                        "surface-container-low": "#1b1b1f",
                        "on-secondary-fixed-variant": "#6b00b0",
                        "on-primary": "#003739",
                        "tertiary": "#fff9f0",
                        "outline": "#849495",
                        "on-primary-fixed": "#002021",
                        "surface-tint": "#00dce5",
                        "surface-container-lowest": "#0e0e12",
                        "primary-fixed-dim": "#00dce5",
                        "surface-variant": "#353439",
                        "error": "#ffb4ab",
                        "surface-container-high": "#2a2a2e",
                        "secondary-container": "#9d05ff",
                        "on-tertiary-container": "#736000"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xxl": "80px",
                        "md": "16px",
                        "xs": "4px",
                        "lg": "24px",
                        "xl": "40px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Space Grotesk"],
                        "label-bold": ["Space Grotesk"],
                        "body-lg": ["Inter"],
                        "metric-xl": ["Space Grotesk"],
                        "display-xl": ["Space Grotesk"],
                        "body-md": ["Inter"],
                        "headline-md": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "label-bold": ["14px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "metric-xl": ["48px", { "lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "display-xl": ["72px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .cyber-grid {
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .neon-glow-cyan {
            filter: drop-shadow(0 0 12px rgba(0, 245, 255, 0.6));
        }

        .glass-card {
            background: rgba(19, 19, 23, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container overflow-x-hidden">
    <!-- Top Navigation -->
    <header
        class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-zinc-950/70 backdrop-blur-md border-b border-white/10 shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
        <div class="flex items-center gap-4">
            <button class="active:scale-95 transition-transform">
                <span class="material-symbols-outlined text-[#00F5FF]">grid_view</span>
            </button>
            <h1
                class="font-['Space_Grotesk'] uppercase tracking-widest text-xs font-black text-[#00F5FF] italic drop-shadow-[0_0_10px_rgba(0,245,255,0.6)]">
                STRIDE_IO</h1>
        </div>
        <div
            class="h-8 w-8 rounded-full overflow-hidden border border-[#00F5FF]/30 active:scale-95 transition-transform">
            <img class="w-full h-full object-cover"
                data-alt="A stylized digital avatar of a futuristic athlete wearing a glowing neon headset and sleek metallic gear. The lighting is dominated by sharp cyan highlights against a dark, tech-infused background, reflecting a competitive gaming and performance-focused persona. The overall aesthetic is clean, modern, and high-energy."
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuDUiWHfd1yLw1HTrXkoK6dGrE_qpV_eQnyWkOpeZfKJLVkYRatMs6SqihYSd9pCSKWVZLVnIpQPH9OrGa9tp0Ez2YC6LefVL-ZRdjxs5hmuRZCqAVWz0Nq2w7_nSCflJAReZred_EvhFqhJTTI4PGhxlee-o3Sf6XYGz9y4RatK-Cg59UDYCFX4kGnQh7llIHkk-f1qhpvrIRt0kSrHK8nZAaP2MS_SahNgQnTL45WQulG-PASk28p1AICFav4W5HBqwMs06XkYyyk" />
        </div>
    </header>
    <!-- Main Content Canvas -->
    <main class="min-h-screen pt-24 pb-32 px-4 md:px-8 relative flex items-center justify-center">
        <!-- Cyber Grid Background -->
        <div class="absolute inset-0 cyber-grid pointer-events-none opacity-40"></div>
        <!-- Share Card Container -->
        <div
            class="relative w-full max-w-2xl aspect-[4/5] glass-card rounded-xl overflow-hidden shadow-2xl border-white/20 group">
            <!-- Background Map Layer -->
            <div class="absolute inset-0 z-0">
                <img class="w-full h-full object-cover opacity-50 mix-blend-screen grayscale contrast-125"
                    data-alt="A dark-themed satellite map of a metropolitan district at night, overlaid with a complex luminous H3 hexagonal grid at resolution 9. Specific hexagonal cells form a glowing neon cyan path through the city streets, pulsating with light to represent a recent athletic route. The background is a deep charcoal and navy blue, creating a high-contrast futuristic telemetry visualization."
                    data-location="Jakarta"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCW8dDVNkGl_BLn_kdxdIJFhj7soRd7TEX6qIywmcSc0iluOWvI-pLYDm2ISwNXMCk7MYpGw56JTUDk7mRGPzHFqZ9PWaGLig8Wke3gvjmOGQk6tcCZQi_9FkLss6yBDg28uP3BPrsfSt_M_sgxTotbyyz5q_lBFdmMNJ0cRcyijJEgYV_AS2WFf7yr12ysUVi_QyPTkqVkt_cPj9jfhJwVvmEs2PFAVEav2-a5skvD_EccLQbCPKV9gLarRHgQbo0j25Z3BWLFVYk" />
                <div class="absolute inset-0 bg-gradient-to-t from-background via-transparent to-transparent"></div>
            </div>
            <!-- Faction Shield Badge (Top Right) -->
            <div class="absolute top-6 right-6 z-20">
                <div
                    class="flex items-center gap-2 px-3 py-1.5 bg-zinc-950/80 border border-primary-container/40 rounded-lg backdrop-blur-xl">
                    <span class="material-symbols-outlined text-primary-container text-lg"
                        style="font-variation-settings: 'FILL' 1;">shield</span>
                    <span
                        class="font-label-bold text-[10px] text-primary-container tracking-widest">CYBER_KNIGHTS</span>
                </div>
            </div>
            <!-- Central Data Cluster -->
            <div class="absolute inset-0 flex flex-col items-center justify-center z-10 text-center px-8">
                <div class="mb-4">
                    <span
                        class="inline-block px-3 py-1 bg-primary-container/10 border border-primary-container/20 text-primary-container font-label-bold text-[10px] rounded mb-4">REGION
                        SECURED</span>
                    <h2 class="font-headline-lg text-[#00F5FF] neon-glow-cyan uppercase tracking-tighter italic">
                        KUNINGAN DISTRICT</h2>
                    <div class="h-0.5 w-24 bg-[#00F5FF] mx-auto mt-2 blur-[1px]"></div>
                </div>
                <div class="glass-card px-6 py-4 rounded-xl border-white/5 flex flex-col items-center">
                    <span class="font-metric-xl text-on-background leading-none">12</span>
                    <span class="font-label-bold text-zinc-500 uppercase text-[12px] mt-1">New Hexagons Claimed</span>
                </div>
            </div>
            <!-- Bottom Share Overlay -->
            <div class="absolute bottom-6 left-6 right-6 z-20 flex justify-between items-end">
                <!-- Metrics Left -->
                <div class="flex gap-4">
                    <div class="flex flex-col">
                        <span class="text-zinc-500 font-label-bold text-[10px]">TOTAL EXP</span>
                        <span class="text-primary-container font-headline-md leading-tight">+2,450</span>
                    </div>
                    <div class="flex flex-col">
                        <span class="text-zinc-500 font-label-bold text-[10px]">DOMINANCE</span>
                        <span class="text-secondary font-headline-md leading-tight">68%</span>
                    </div>
                </div>
                <!-- Footer Right -->
                <div class="flex flex-col items-end">
                    <div class="flex items-center gap-2 mb-1">
                        <svg class="w-4 h-4 fill-[#FC4C02]" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.169">
                            </path>
                        </svg>
                        <span class="text-white/60 text-[10px] font-medium tracking-tight">Shared from StrideIO</span>
                    </div>
                    <span class="text-zinc-600 text-[8px] font-label-bold uppercase">Telemetry ID: #8821-X9</span>
                </div>
            </div>
        </div>
        <!-- Action HUD -->
        <div class="absolute bottom-24 flex gap-4">
            <button
                class="bg-primary-container text-on-primary px-8 py-3 font-label-bold rounded-lg flex items-center gap-2 active:scale-95 transition-all shadow-[0_0_20px_rgba(0,245,255,0.3)]">
                <span class="material-symbols-outlined text-xl">share</span>
                EXPORT CARD
            </button>
            <button
                class="bg-zinc-950/80 border border-white/10 text-on-background px-6 py-3 font-label-bold rounded-lg hover:bg-zinc-900 transition-all active:scale-95">
                DETAILS
            </button>
        </div>
    </main>
    <!-- Bottom Navigation Bar -->
    <nav
        class="fixed bottom-0 w-full z-50 flex justify-around items-center h-20 pb-safe px-4 bg-zinc-950/80 backdrop-blur-xl border-t border-white/5 shadow-[0_-8px_32px_rgba(0,0,0,0.8)]">
        <!-- DASHBOARD -->
        <a class="flex flex-col items-center justify-center text-zinc-600 opacity-60 hover:opacity-100 active:scale-90 transition-all duration-150 ease-out"
            href="#">
            <span class="material-symbols-outlined">speed</span>
            <span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-tighter">DASHBOARD</span>
        </a>
        <!-- DOMINANCE (ACTIVE) -->
        <a class="flex flex-col items-center justify-center text-[#00F5FF] drop-shadow-[0_0_8px_rgba(0,245,255,0.8)] scale-110 active:scale-90 transition-all duration-150 ease-out"
            href="#">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">map</span>
            <span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-tighter">DOMINANCE</span>
        </a>
        <!-- SNAPSHOT -->
        <a class="flex flex-col items-center justify-center text-zinc-600 opacity-60 hover:opacity-100 active:scale-90 transition-all duration-150 ease-out"
            href="#">
            <span class="material-symbols-outlined">analytics</span>
            <span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-tighter">SNAPSHOT</span>
        </a>
        <!-- CIRCUIT -->
        <a class="flex flex-col items-center justify-center text-zinc-600 opacity-60 hover:opacity-100 active:scale-90 transition-all duration-150 ease-out"
            href="#">
            <span class="material-symbols-outlined">hub</span>
            <span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-tighter">CIRCUIT</span>
        </a>
    </nav>
</body>

</html>
