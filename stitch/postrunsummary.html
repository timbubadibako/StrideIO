<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>StrideIO - Run Summary</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "error": "#ffb4ab",
                        "on-primary": "#003739",
                        "tertiary-fixed-dim": "#e7c427",
                        "error-container": "#93000a",
                        "tertiary": "#fff9f0",
                        "on-surface-variant": "#b9caca",
                        "secondary": "#dfb7ff",
                        "on-tertiary": "#3a3000",
                        "primary-container": "#00f5ff",
                        "on-secondary-fixed": "#2d004f",
                        "surface-container-highest": "#353439",
                        "inverse-primary": "#00696e",
                        "on-secondary-fixed-variant": "#6b00b0",
                        "primary-fixed-dim": "#00dce5",
                        "surface-bright": "#39393d",
                        "on-primary-fixed-variant": "#004f53",
                        "inverse-on-surface": "#303034",
                        "surface-container": "#1f1f23",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-tertiary-fixed": "#221b00",
                        "secondary-fixed-dim": "#dfb7ff",
                        "on-secondary": "#4b007e",
                        "secondary-container": "#9d05ff",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#ffe16c",
                        "on-tertiary-container": "#736000",
                        "background": "#131317",
                        "on-secondary-container": "#f7e6ff",
                        "surface": "#131317",
                        "on-primary-fixed": "#002021",
                        "surface-container-lowest": "#0e0e12",
                        "primary": "#e9feff",
                        "inverse-surface": "#e4e1e7",
                        "on-primary-container": "#006c71",
                        "surface-tint": "#00dce5",
                        "outline-variant": "#3a494a",
                        "surface-variant": "#353439",
                        "surface-dim": "#131317",
                        "primary-fixed": "#63f7ff",
                        "surface-container-high": "#2a2a2e",
                        "on-surface": "#e4e1e7",
                        "secondary-fixed": "#f1daff",
                        "outline": "#849495",
                        "tertiary-container": "#ffdb3f",
                        "on-error": "#690005",
                        "surface-container-low": "#1b1b1f",
                        "on-background": "#e4e1e7"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "xl": "40px",
                        "sm": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "xs": "4px",
                        "xxl": "80px"
                    },
                    fontFamily: {
                        "metric-xl": ["Space Grotesk"],
                        "body-lg": ["Inter"],
                        "label-bold": ["Space Grotesk"],
                        "body-md": ["Inter"],
                        "display-xl": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"]
                    },
                    fontSize: {
                        "metric-xl": ["48px", { lineHeight: "1", letterSpacing: "-0.02em", fontWeight: "700" }],
                        "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
                        "label-bold": ["14px", { lineHeight: "1", letterSpacing: "0.1em", fontWeight: "700" }],
                        "body-md": ["16px", { lineHeight: "1.5", fontWeight: "400" }],
                        "display-xl": ["72px", { lineHeight: "1.1", letterSpacing: "-0.04em", fontWeight: "700" }],
                        "headline-md": ["24px", { lineHeight: "1.3", fontWeight: "600" }],
                        "headline-lg": ["40px", { lineHeight: "1.2", letterSpacing: "-0.02em", fontWeight: "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .cyber-grid {
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .glass-card {
            background: rgba(31, 31, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: inherit;
            padding: 1px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 100%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background text-on-background font-body-md antialiased min-h-screen relative overflow-x-hidden selection:bg-primary-fixed selection:text-on-primary">
    <!-- Cyber-grid Base Layer -->
    <div class="fixed inset-0 cyber-grid pointer-events-none z-0"></div>
    <!-- Main Content Canvas -->
    <main class="relative z-10 flex flex-col min-h-screen p-md lg:p-xl max-w-4xl mx-auto">
        <!-- Header: Transactional/Success context, so global nav is suppressed -->
        <header class="flex items-center justify-between py-sm mb-lg">
            <button
                class="w-10 h-10 rounded-full glass-card flex items-center justify-center text-on-surface-variant hover:text-primary-fixed transition-colors">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
            </button>
            <h1
                class="font-headline-md text-headline-md text-primary-fixed uppercase tracking-widest drop-shadow-[0_0_8px_rgba(99,247,255,0.4)]">
                Mission Complete
            </h1>
            <div class="w-10 h-10"></div> <!-- Spacer for centering -->
        </header>
        <!-- Map View Hero Section -->
        <section
            class="w-full h-64 md:h-96 rounded-xl overflow-hidden relative border border-primary-fixed/30 shadow-[0_0_30px_rgba(0,245,255,0.15)] mb-lg group">
            <!-- Map Image Placeholder with detailed alt text for generation -->
            <img alt="A sleek, dark mode digital map interface showing an urban environment from a top-down perspective. A winding running route is highlighted in an intense, luminous neon cyan color, resembling a glowing laser beam. Several hexagonal zones clustered along the route are glowing brightly in a radiant, saturated gold color, indicating newly conquered territories within a gamified system. The overall aesthetic is high-tech, cyber-athletic, and visually striking, utilizing deep blacks and vibrant neon accents to convey a sense of achievement and telemetry."
                class="w-full h-full object-cover object-center opacity-80 mix-blend-screen"
                data-alt="A sleek, dark mode digital map interface showing an urban environment from a top-down perspective. A winding running route is highlighted in an intense, luminous neon cyan color, resembling a glowing laser beam. Several hexagonal zones clustered along the route are glowing brightly in a radiant, saturated gold color, indicating newly conquered territories within a gamified system. The overall aesthetic is high-tech, cyber-athletic, and visually striking, utilizing deep blacks and vibrant neon accents to convey a sense of achievement and telemetry."
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5rF6WpRTwa8Igwy0vzYJvFIgC08JPad9TiEMzSe8vbDhJAKOzg17sHqRQp1W7ZRLRWAvanjVlKS66CTripV-cQz-3GWLW8pTZs2B-jtsU6xGVNo-yKG8_WN103U29g1ymqQoYt_9rEjrOgDpxwgkPh7CyyKjnQwcRPOkg2MPjMqmwmweRR_e2nRjbLN0zeZeHR6zcexgRp52-yvb3GTsRLIdczVClPWmzLDEyUNYtVmWOn5M6k7BctuRTKUM-adeC9RYMCFr24Ws" />
            <!-- Map Overlay UI -->
            <div class="absolute bottom-4 left-4 right-4 flex justify-between items-end pointer-events-none">
                <div class="glass-card px-4 py-2 rounded-lg flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-tertiary-fixed shadow-[0_0_8px_rgba(255,225,108,0.8)]"></div>
                    <span class="font-label-bold text-label-bold text-tertiary-fixed uppercase">Zones Captured</span>
                </div>
                <div class="glass-card p-2 rounded-lg text-primary-fixed">
                    <span class="material-symbols-outlined text-[24px]">my_location</span>
                </div>
            </div>
        </section>
        <!-- Stats Bento Grid -->
        <section class="grid grid-cols-2 gap-md mb-lg">
            <!-- Total Area Card -->
            <div
                class="glass-card rounded-xl p-lg relative overflow-hidden flex flex-col justify-between group hover:border-primary-fixed/50 transition-colors duration-300">
                <div class="flex items-center gap-2 mb-4 text-on-surface-variant">
                    <span class="material-symbols-outlined"
                        style="font-variation-settings: 'FILL' 1;">format_shapes</span>
                    <span class="font-label-bold text-label-bold uppercase tracking-widest">Total Area</span>
                </div>
                <div
                    class="font-metric-xl text-metric-xl text-primary-fixed drop-shadow-[0_0_12px_rgba(99,247,255,0.4)]">
                    12.4
                    <span class="font-headline-md text-headline-md text-on-surface-variant ml-1">km²</span>
                </div>
            </div>
            <!-- Rank Jump Card -->
            <div
                class="glass-card rounded-xl p-lg relative overflow-hidden flex flex-col justify-between group hover:border-secondary/50 transition-colors duration-300">
                <!-- Faction Banner Pip -->
                <div class="absolute top-0 left-0 w-1 h-full bg-secondary shadow-[0_0_10px_rgba(223,183,255,0.6)]">
                </div>
                <div class="flex items-center gap-2 mb-4 text-on-surface-variant pl-2">
                    <span class="material-symbols-outlined text-secondary"
                        style="font-variation-settings: 'FILL' 1;">military_tech</span>
                    <span class="font-label-bold text-label-bold uppercase tracking-widest">Rank Jump</span>
                </div>
                <div
                    class="font-metric-xl text-metric-xl text-secondary drop-shadow-[0_0_12px_rgba(223,183,255,0.4)] pl-2 flex items-center">
                    <span class="material-symbols-outlined text-[40px] mr-1">arrow_upward</span>
                    14
                </div>
            </div>
            <!-- Faction Points Card (Full Width) -->
            <div
                class="glass-card col-span-2 rounded-xl p-lg relative overflow-hidden flex items-center justify-between group hover:border-tertiary-fixed/50 transition-colors duration-300">
                <div class="flex flex-col">
                    <div class="flex items-center gap-2 mb-2 text-on-surface-variant">
                        <span class="material-symbols-outlined text-tertiary-fixed"
                            style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
                        <span class="font-label-bold text-label-bold uppercase tracking-widest">Faction Points</span>
                    </div>
                    <div
                        class="font-metric-xl text-metric-xl text-tertiary-fixed drop-shadow-[0_0_12px_rgba(255,225,108,0.5)]">
                        +500
                    </div>
                </div>
                <!-- Decorative energetic element -->
                <div
                    class="w-16 h-16 rounded-full border-2 border-dashed border-tertiary-fixed/40 flex items-center justify-center animate-[spin_10s_linear_infinite] opacity-50">
                    <div class="w-10 h-10 rounded-full border border-tertiary-fixed flex items-center justify-center">
                        <div class="w-4 h-4 rounded-full bg-tertiary-fixed shadow-[0_0_10px_rgba(255,225,108,0.8)]">
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Social & Action Buttons -->
        <section class="flex flex-col sm:flex-row gap-md mt-auto pt-lg">
            <!-- Primary Action: Share to Strava -->
            <button
                class="flex-1 bg-primary-fixed text-on-primary font-label-bold text-label-bold uppercase tracking-widest py-4 px-6 rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-all duration-150 shadow-[0_0_20px_rgba(99,247,255,0.3)] hover:shadow-[0_0_30px_rgba(99,247,255,0.6)]">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">share</span>
                Share to Strava
            </button>
            <!-- Secondary Action: Domination Badge -->
            <button
                class="flex-1 glass-card border border-primary-fixed/30 text-primary-fixed font-label-bold text-label-bold uppercase tracking-widest py-4 px-6 rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-all duration-150 hover:bg-primary-fixed/10 hover:border-primary-fixed shadow-[0_0_15px_rgba(0,245,255,0.0)] hover:shadow-[0_0_20px_rgba(0,245,255,0.2)]">
                <span class="material-symbols-outlined"
                    style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
                View Domination
            </button>
        </section>
    </main>
</body>

</html>
