<!DOCTYPE html>

<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style>
    body {
      background-color: #131317;
      background-image:
        linear-gradient(rgba(0, 245, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90px, rgba(0, 245, 255, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
      margin: 0;
      overflow-x: hidden;
    }

    .cyber-grid {
      background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .glass-card {
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
    }

    .neon-glow {
      box-shadow: 0 0 16px 0 rgba(0, 245, 255, 0.3);
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }
  </style>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "inverse-primary": "#00696e",
            "secondary": "#dfb7ff",
            "background": "#131317",
            "on-error-container": "#ffdad6",
            "surface-bright": "#39393d",
            "on-background": "#e4e1e7",
            "inverse-on-surface": "#303034",
            "surface-container-highest": "#353439",
            "on-tertiary-fixed-variant": "#544600",
            "on-tertiary": "#3a3000",
            "tertiary-fixed": "#ffe16c",
            "on-primary-fixed-variant": "#004f53",
            "surface-dim": "#131317",
            "on-tertiary-fixed": "#221b00",
            "on-primary-container": "#006c71",
            "on-error": "#690005",
            "error-container": "#93000a",
            "tertiary-fixed-dim": "#e7c427",
            "inverse-surface": "#e4e1e7",
            "tertiary-container": "#ffdb3f",
            "surface-container": "#1f1f23",
            "secondary-fixed": "#f1daff",
            "primary-fixed": "#63f7ff",
            "primary-container": "#00f5ff",
            "on-surface": "#e4e1e7",
            "secondary-fixed-dim": "#dfb7ff",
            "on-secondary-container": "#f7e6ff",
            "primary": "#e9feff",
            "on-surface-variant": "#b9caca",
            "on-secondary": "#4b007e",
            "surface": "#131317",
            "outline-variant": "#3a494a",
            "on-secondary-fixed": "#2d004f",
            "surface-container-low": "#1b1b1f",
            "on-secondary-fixed-variant": "#6b00b0",
            "on-primary": "#003739",
            "tertiary": "#fff9f0",
            "outline": "#849495",
            "on-primary-fixed": "#002021",
            "surface-tint": "#00dce5",
            "surface-container-lowest": "#0e0e12",
            "primary-fixed-dim": "#00dce5",
            "surface-variant": "#353439",
            "error": "#ffb4ab",
            "surface-container-high": "#2a2a2e",
            "secondary-container": "#9d05ff",
            "on-tertiary-container": "#736000"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "xxl": "80px",
            "md": "16px",
            "xs": "4px",
            "lg": "24px",
            "xl": "40px",
            "sm": "8px"
          },
          "fontFamily": {
            "headline-lg": ["Space Grotesk"],
            "label-bold": ["Space Grotesk"],
            "body-lg": ["Inter"],
            "metric-xl": ["Space Grotesk"],
            "display-xl": ["Space Grotesk"],
            "body-md": ["Inter"],
            "headline-md": ["Space Grotesk"]
          },
          "fontSize": {
            "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }],
            "label-bold": ["14px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }],
            "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "metric-xl": ["48px", { "lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "display-xl": ["72px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
            "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
            "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }]
          }
        },
      },
    }
  </script>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body
  class="bg-background text-on-background font-body-md selection:bg-primary-container selection:text-on-primary-container">
  <!-- TOP APP BAR -->
  <header
    class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-zinc-950/70 backdrop-blur-md border-b border-white/10 shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
    <div class="flex items-center gap-4">
      <button class="text-[#00F5FF] active:scale-95 transition-transform">
        <span class="material-symbols-outlined">grid_view</span>
      </button>
      <span
        class="font-['Space_Grotesk'] font-black text-[#00F5FF] tracking-tighter italic drop-shadow-[0_0_10px_rgba(0,245,255,0.6)] text-lg">STRIDE_IO</span>
    </div>
    <div class="flex items-center gap-6">
      <nav class="hidden md:flex gap-8 font-['Space_Grotesk'] uppercase tracking-widest text-xs">
        <a class="text-[#00F5FF] transition-colors duration-150" href="#">DASHBOARD</a>
        <a class="text-zinc-500 hover:text-white transition-colors duration-150" href="#">DOMINANCE</a>
        <a class="text-zinc-500 hover:text-white transition-colors duration-150" href="#">SNAPSHOT</a>
        <a class="text-zinc-500 hover:text-white transition-colors duration-150" href="#">CIRCUIT</a>
      </nav>
      <div class="w-8 h-8 rounded-full border border-primary-container/30 overflow-hidden">
        <img class="w-full h-full object-cover"
          data-alt="A futuristic close-up portrait of a professional runner with glowing neon telemetry projected onto their face. The lighting is dramatic and cinematic, using deep purples and electric cyan highlights to emphasize the high-performance athletic aesthetic. The background is a dark, tech-oriented studio setting with subtle lens flares and sharp focus on the athlete's intense gaze."
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuBv7EpAPwSQD4c4bTqkSWfd01wchuA1z0-rVnltnO4i-2h94gBqPoqeEQeWvgy05FDxIOCPRAPArV6zJyYRkoWVDCUrzslDaFgQMbpjoIHgGUzam8IRKuREHQEWByu-q285V5uGGwogz28ce3d32tyXpzVuASaCi0ur9WtIgaoe_cz8OhoAg0L7MLuO0L98GPN2OJsqoZxVzAFJ0OqC09ntFp1g578J1Qyh74ZzxhkwTm3jfYk7xQtdNNXazT3fR5Lc6_C0z06Rjq4" />
      </div>
    </div>
  </header>
  <main class="min-h-screen pt-32 pb-40 px-6 flex flex-col items-center justify-center max-w-7xl mx-auto">
    <!-- MAIN GRID SHARE CARD -->
    <div class="w-full relative group">
      <!-- Background Map Canvas -->
      <div
        class="absolute inset-0 rounded-xl overflow-hidden grayscale opacity-30 mix-blend-screen pointer-events-none">
        <div class="w-full h-full bg-zinc-900" data-location="Tokyo District" style="">
          <img class="w-full h-full object-cover"
            data-alt="A top-down satellite view of a complex city grid at night, rendered in a dark matter aesthetic with glowing cyan paths tracing a running route. The map features high-contrast dark blacks and deep greys with luminous filaments of neon energy representing traffic and data flow. The style is reminiscent of a high-tech tactical HUD from a futuristic racing game."
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuD-2Yv5l90Ml5jRj09splhx-AKCJwPAwyUimWj6lmhv9xwXTDmpnOtGjAQwWJMRXBrf7Iax9RGls2UBAoQc0z16j3yJc7fglcFalUZaJpOcVUNurK6N_200FX4I3v2yyyxHkmolrhQB5uOgQFDbPh8S0ke7Xzp-vIKIvMHy8DRHNxXpOww-P5PoyFfs4OJn6m43Dx9fmA7E1HgNPLC03FBvRUnbTEzswDGZjyT0cyOxdKeqjTThNLkSBxydum0N-BuTbzhJ-lmhyTE" />
        </div>
      </div>
      <!-- GLASSMORPHISM OVERLAY -->
      <div class="relative glass-card rounded-xl p-lg md:p-xl flex flex-col gap-xl border-t border-l border-white/20">
        <!-- HEADER SECTION -->
        <div class="flex flex-col gap-xs">
          <h1 class="font-headline-lg text-primary-container tracking-tighter flex items-center gap-3">
            MY RUN
            <span class="w-2 h-2 bg-secondary rounded-full animate-pulse"></span>
          </h1>
          <div class="flex items-center gap-2">
            <div class="w-10 h-10 flex items-center justify-center">
              <svg class="w-full h-full fill-none stroke-primary-container stroke-[4px]" viewbox="0 0 100 100">
                <path d="M50 5 L90 27.5 V72.5 L50 95 L10 72.5 V27.5 Z"></path>
                <path d="M50 25 L72 37.5 V62.5 L50 75 L28 62.5 V37.5 Z" opacity="0.5"></path>
              </svg>
            </div>
            <span class="font-label-bold text-on-surface-variant text-[10px] tracking-[0.2em] uppercase">The Grid
              Captured</span>
          </div>
        </div>
        <!-- STATS ROW (CENTER) -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-lg py-xl border-y border-white/5">
          <div class="flex flex-col gap-1">
            <span class="font-label-bold text-zinc-500 text-[10px] tracking-widest uppercase">Distance</span>
            <div class="flex items-baseline gap-1">
              <span class="font-metric-xl text-on-surface">12.4</span>
              <span class="font-label-bold text-primary-container text-xs">KM</span>
            </div>
          </div>
          <div class="flex flex-col gap-1">
            <span class="font-label-bold text-zinc-500 text-[10px] tracking-widest uppercase">Pace</span>
            <div class="flex items-baseline gap-1">
              <span class="font-metric-xl text-on-surface">5:24</span>
              <span class="font-label-bold text-primary-container text-xs">/KM</span>
            </div>
          </div>
          <div class="flex flex-col gap-1">
            <span class="font-label-bold text-zinc-500 text-[10px] tracking-widest uppercase">Calories</span>
            <div class="flex items-baseline gap-1">
              <span class="font-metric-xl text-on-surface">840</span>
              <span class="font-label-bold text-primary-container text-xs">KCAL</span>
            </div>
          </div>
          <div class="flex flex-col gap-1">
            <span class="font-label-bold text-zinc-500 text-[10px] tracking-widest uppercase">Elevation</span>
            <div class="flex items-baseline gap-1">
              <span class="font-metric-xl text-on-surface">120</span>
              <span class="font-label-bold text-primary-container text-xs">M</span>
            </div>
          </div>
        </div>
        <!-- FOOTER SECTION (BOTTOM RIGHT) -->
        <div class="flex justify-end items-end">
          <div class="text-right">
            <div class="flex items-center justify-end gap-2 text-primary-container mb-1">
              <span class="material-symbols-outlined text-sm">electric_bolt</span>
              <span class="font-headline-md italic font-black tracking-tighter leading-none">STRIDE_IO</span>
            </div>
            <p class="font-label-bold text-zinc-600 text-[10px] tracking-widest uppercase">The Grid Awaits</p>
          </div>
        </div>
      </div>
      <!-- Accent Faction Banner -->
      <div class="absolute top-0 left-0 w-16 h-1 bg-primary-container neon-glow rounded-tr-full rounded-br-full"></div>
    </div>
    <!-- CALL TO ACTION -->
    <div class="mt-xl flex flex-wrap justify-center gap-md">
      <button
        class="bg-primary-container text-on-primary px-lg py-md rounded font-label-bold uppercase tracking-widest flex items-center gap-2 active:scale-95 transition-all shadow-[0_0_20px_rgba(0,245,255,0.4)]">
        <span class="material-symbols-outlined">share</span>
        Publish to Grid
      </button>
      <button
        class="border border-white/20 hover:border-primary-container transition-colors px-lg py-md rounded font-label-bold text-on-surface uppercase tracking-widest flex items-center gap-2 active:scale-95 backdrop-blur-sm">
        <span class="material-symbols-outlined">download</span>
        Export Telemetry
      </button>
    </div>
  </main>
  <!-- BOTTOM NAVBAR (VISIBLE ON MOBILE) -->
  <nav
    class="md:hidden fixed bottom-0 w-full z-50 flex justify-around items-center h-20 pb-safe px-4 bg-zinc-950/80 backdrop-blur-xl border-t border-white/5 shadow-[0_-8px_32px_rgba(0,0,0,0.8)]">
    <div class="flex flex-col items-center justify-center text-zinc-600 opacity-60">
      <span class="material-symbols-outlined">speed</span>
      <span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-tighter">DASHBOARD</span>
    </div>
    <div class="flex flex-col items-center justify-center text-zinc-600 opacity-60">
      <span class="material-symbols-outlined">map</span>
      <span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-tighter">DOMINANCE</span>
    </div>
    <div
      class="flex flex-col items-center justify-center text-[#00F5FF] drop-shadow-[0_0_8px_rgba(0,245,255,0.8)] scale-110">
      <span class="material-symbols-outlined">analytics</span>
      <span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-tighter">SNAPSHOT</span>
    </div>
    <div class="flex flex-col items-center justify-center text-zinc-600 opacity-60">
      <span class="material-symbols-outlined">hub</span>
      <span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-tighter">CIRCUIT</span>
    </div>
  </nav>
  <!-- FLOATING ACTION BUTTON (CONTEXTUAL) -->
  <button
    class="fixed bottom-24 right-6 w-14 h-14 bg-primary-container text-on-primary rounded-full shadow-[0_0_24px_rgba(0,245,255,0.5)] flex items-center justify-center active:scale-90 transition-all md:bottom-10 md:right-10">
    <span class="material-symbols-outlined" data-weight="fill">add</span>
  </button>
</body>

</html>
