<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>StrideIO - Active Workout</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@400;600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ffb4ab",
                        "on-primary": "#003739",
                        "tertiary-fixed-dim": "#e7c427",
                        "error-container": "#93000a",
                        "tertiary": "#fff9f0",
                        "on-surface-variant": "#b9caca",
                        "secondary": "#dfb7ff",
                        "on-tertiary": "#3a3000",
                        "primary-container": "#00f5ff",
                        "on-secondary-fixed": "#2d004f",
                        "surface-container-highest": "#353439",
                        "inverse-primary": "#00696e",
                        "on-secondary-fixed-variant": "#6b00b0",
                        "primary-fixed-dim": "#00dce5",
                        "surface-bright": "#39393d",
                        "on-primary-fixed-variant": "#004f53",
                        "inverse-on-surface": "#303034",
                        "surface-container": "#1f1f23",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-tertiary-fixed": "#221b00",
                        "secondary-fixed-dim": "#dfb7ff",
                        "on-secondary": "#4b007e",
                        "secondary-container": "#9d05ff",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#ffe16c",
                        "on-tertiary-container": "#736000",
                        "background": "#131317",
                        "on-secondary-container": "#f7e6ff",
                        "surface": "#131317",
                        "on-primary-fixed": "#002021",
                        "surface-container-lowest": "#0e0e12",
                        "primary": "#e9feff",
                        "inverse-surface": "#e4e1e7",
                        "on-primary-container": "#006c71",
                        "surface-tint": "#00dce5",
                        "outline-variant": "#3a494a",
                        "surface-variant": "#353439",
                        "surface-dim": "#131317",
                        "primary-fixed": "#63f7ff",
                        "surface-container-high": "#2a2a2e",
                        "on-surface": "#e4e1e7",
                        "secondary-fixed": "#f1daff",
                        "outline": "#849495",
                        "tertiary-container": "#ffdb3f",
                        "on-error": "#690005",
                        "surface-container-low": "#1b1b1f",
                        "on-background": "#e4e1e7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xl": "40px",
                        "sm": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "xs": "4px",
                        "xxl": "80px"
                    },
                    "fontFamily": {
                        "metric-xl": ["Space Grotesk"],
                        "body-lg": ["Inter"],
                        "label-bold": ["Space Grotesk"],
                        "body-md": ["Inter"],
                        "display-xl": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "metric-xl": ["48px", { "lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-bold": ["14px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-xl": ["72px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .cyber-grid {
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neon-glow-primary {
            filter: drop-shadow(0 0 12px rgba(0, 245, 255, 0.5));
        }

        .neon-glow-secondary {
            filter: drop-shadow(0 0 12px rgba(223, 183, 255, 0.5));
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background text-on-background min-h-screen cyber-grid overflow-x-hidden flex flex-col font-body-md text-body-md">
    <!-- Task-Focused Header: Active Run Status & Group -->
    <header class="w-full pt-xl pb-md px-lg flex items-center justify-between z-10">
        <div class="flex items-center gap-sm">
            <span class="material-symbols-outlined text-primary-container neon-glow-primary"
                style="font-variation-settings: 'FILL' 1;">directions_run</span>
            <span
                class="font-label-bold text-label-bold text-primary-container tracking-widest uppercase neon-glow-primary">Sync
                Active</span>
        </div>
        <!-- Group Run Indicator -->
        <div class="flex -space-x-sm">
            <img alt="Runner 1" class="w-10 h-10 rounded-full border-2 border-background z-30 opacity-100"
                data-alt="A futuristic portrait of an athlete wearing sleek, glowing cyan cybernetic visors in a dark, high-contrast urban environment. The lighting is harsh and directional, emphasizing physical exertion and digital integration. The mood is intense and highly competitive."
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBsCKNpIuAMf6HEXuS-HfM7awFddOEblOVVosfmyIUSM8I-4p7iqAD4iYJyAJEhRvowrYFBQ-iUZTy_KxzwQwS-RNOM6elaKzxFcBoZwDSwXr6Epw4gjaATgtDkiUrdujPvwIvOWzvko8lGCdBNPIVURbGi3crEK8VklxCnwwKD2UAJ_VGrCa_tXs4U8Rir6N8AsC7ZWE_RDdeaB0EoxUVqixbLKkMF_vZ3UFWfAp0V0_pt2s_YEC2d06p0ZA09o6N0Ogx2ICAJny4" />
            <img alt="Runner 2" class="w-10 h-10 rounded-full border-2 border-background z-20 opacity-80"
                data-alt="A profile shot of a runner illuminated by harsh magenta and blue neon lights against an absolute black background. The athlete appears focused and determined, with subtle geometric graphic overlays suggesting augmented reality telemetry tracking their performance."
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtJdCoY-H20bcUt3u7sTzA6RfjZNGZsjTDxoo4iFwPw7T5wxGu9mWB7w3zezYtHa-Fsqh_WcGD5ewEOYh1I74AbnNHaKxSnmMNTjQus0nB1tTT38ZVy7XxFMITo7gmC2tYZ16uvz2-3EfIXw2lbHgv6UQBdmLb0fMRY4kjO6m22cczfLDmFORk-abv3TMcdN15XtaJBLvJ5E0Nny2LTS7SVNFvUBHm4FOuOFiCYN1suGC72yvsn9xBDGtWdkNPNEyzUhFqxi8hi2Y" />
            <div
                class="w-10 h-10 rounded-full border-2 border-background bg-surface-container-high z-10 flex items-center justify-center font-label-bold text-label-bold text-on-surface-variant">
                +2
            </div>
        </div>
    </header>
    <!-- Main Active Canvas -->
    <main class="flex-1 px-lg flex flex-col items-center justify-start gap-lg z-10 pb-xxl">
        <!-- Visual Feedback: Hexagon Array -->
        <div class="relative w-full max-w-[300px] aspect-square flex items-center justify-center my-md">
            <svg class="w-full h-full neon-glow-primary" viewbox="0 0 200 200">
                <!-- Center Hex -->
                <polygon class="fill-primary-container" opacity="0.9"
                    points="100,45 147.6,72.5 147.6,127.5 100,155 52.4,127.5 52.4,72.5"></polygon>
                <!-- Surrounding Hexes -->
                <polygon class="fill-none stroke-primary-container stroke-2" opacity="0.3"
                    points="100,-10 147.6,17.5 147.6,72.5 100,100 52.4,72.5 52.4,17.5"></polygon>
                <polygon class="fill-primary-container" opacity="0.6"
                    points="147.6,17.5 195.2,45 195.2,100 147.6,127.5 100,100 100,45"></polygon>
                <polygon class="fill-none stroke-primary-container stroke-2" opacity="0.3"
                    points="147.6,127.5 195.2,155 195.2,210 147.6,237.5 100,210 100,155"></polygon>
                <polygon class="fill-primary-container" opacity="0.3"
                    points="100,155 147.6,182.5 147.6,237.5 100,265 52.4,237.5 52.4,182.5"></polygon>
                <polygon class="fill-none stroke-primary-container stroke-2" opacity="0.5"
                    points="4.8,155 52.4,182.5 100,155 100,100 52.4,72.5 4.8,100"></polygon>
                <polygon class="fill-primary-container" opacity="0.8"
                    points="4.8,45 52.4,72.5 100,45 100,-10 52.4,-37.5 4.8,-10"></polygon>
            </svg>
            <div class="absolute inset-0 flex flex-col items-center justify-center">
                <span class="font-display-xl text-display-xl text-background">84</span>
                <span class="font-label-bold text-label-bold text-background uppercase tracking-widest">% SYNC</span>
            </div>
        </div>
        <!-- Telemetry Bento Grid -->
        <div class="w-full grid grid-cols-2 gap-sm">
            <!-- Distance -->
            <div class="glass-panel rounded-xl p-md flex flex-col justify-between h-32">
                <span
                    class="font-label-bold text-label-bold text-on-surface-variant uppercase flex items-center gap-xs">
                    <span class="material-symbols-outlined text-[16px]">route</span> Dist
                </span>
                <div class="flex items-baseline gap-xs">
                    <span class="font-metric-xl text-metric-xl text-primary">4.2</span>
                    <span class="font-body-md text-body-md text-on-surface-variant">km</span>
                </div>
            </div>
            <!-- Pace -->
            <div class="glass-panel rounded-xl p-md flex flex-col justify-between h-32 relative overflow-hidden">
                <div class="absolute top-0 right-0 w-16 h-16 bg-primary-container/10 blur-xl rounded-full"></div>
                <span
                    class="font-label-bold text-label-bold text-on-surface-variant uppercase flex items-center gap-xs">
                    <span class="material-symbols-outlined text-[16px]">speed</span> Pace
                </span>
                <div class="flex items-baseline gap-xs">
                    <span class="font-metric-xl text-metric-xl text-primary">5:24</span>
                    <span class="font-body-md text-body-md text-on-surface-variant">/km</span>
                </div>
            </div>
            <!-- Time -->
            <div class="glass-panel rounded-xl p-md flex flex-col justify-between h-32">
                <span
                    class="font-label-bold text-label-bold text-on-surface-variant uppercase flex items-center gap-xs">
                    <span class="material-symbols-outlined text-[16px]">timer</span> Time
                </span>
                <div class="flex items-baseline gap-xs">
                    <span class="font-metric-xl text-metric-xl text-primary">22:45</span>
                </div>
            </div>
            <!-- Heart Rate -->
            <div class="glass-panel rounded-xl p-md flex flex-col justify-between h-32 relative">
                <!-- HR Pulse accent -->
                <div
                    class="absolute bottom-md right-md w-2 h-2 rounded-full bg-error drop-shadow-[0_0_8px_rgba(255,180,171,0.8)] animate-pulse">
                </div>
                <span
                    class="font-label-bold text-label-bold text-on-surface-variant uppercase flex items-center gap-xs">
                    <span class="material-symbols-outlined text-[16px]">favorite</span> BPM
                </span>
                <div class="flex items-baseline gap-xs">
                    <span class="font-metric-xl text-metric-xl text-primary">164</span>
                </div>
            </div>
        </div>
        <!-- Territory Acquired Widget -->
        <div class="w-full glass-panel rounded-xl p-md relative overflow-hidden">
            <div class="absolute -right-xl -top-xl w-32 h-32 bg-secondary-container/20 blur-2xl rounded-full"></div>
            <div class="flex justify-between items-end">
                <div class="flex flex-col gap-xs">
                    <span
                        class="font-label-bold text-label-bold text-secondary uppercase tracking-widest neon-glow-secondary">Territory
                        Acquired</span>
                    <span class="font-body-md text-body-md text-on-surface-variant">Sectors claimed this session</span>
                </div>
                <span class="font-display-xl text-display-xl text-secondary">03</span>
            </div>
            <!-- Progress bar -->
            <div class="w-full h-1 bg-surface-container-high mt-md rounded-full overflow-hidden">
                <div class="h-full bg-secondary w-3/4 drop-shadow-[0_0_4px_rgba(223,183,255,0.8)]"></div>
            </div>
        </div>
    </main>
    <!-- Footer Controls -->
    <footer
        class="fixed bottom-0 left-0 w-full p-lg bg-gradient-to-t from-background via-background to-transparent z-50 flex flex-col gap-md pb-xl">
        <!-- Ghost Mode Toggle -->
        <div
            class="flex items-center justify-between glass-panel rounded-full px-md py-sm mb-sm w-max mx-auto border-secondary/20">
            <div class="flex items-center gap-sm mr-lg">
                <span class="material-symbols-outlined text-secondary text-[20px]">visibility_off</span>
                <span class="font-label-bold text-label-bold text-on-surface uppercase tracking-wider">Ghost Mode</span>
            </div>
            <!-- Switch UI -->
            <div
                class="w-12 h-6 bg-surface-container-highest rounded-full relative border border-white/5 cursor-pointer">
                <div class="absolute right-1 top-1 w-4 h-4 rounded-full bg-secondary neon-glow-secondary"></div>
            </div>
        </div>
        <!-- Action Buttons -->
        <div class="flex gap-md w-full">
            <button
                class="flex-1 bg-surface-container-high text-on-surface font-label-bold text-label-bold uppercase py-md rounded-xl border border-white/5 flex items-center justify-center gap-sm hover:bg-surface-bright transition-colors">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">pause</span> Pause
            </button>
            <button
                class="flex-[2] bg-primary-container text-on-primary font-label-bold text-label-bold uppercase py-md rounded-xl neon-glow-primary flex items-center justify-center gap-sm hover:brightness-110 transition-all">
                End Run <span class="material-symbols-outlined"
                    style="font-variation-settings: 'FILL' 1;">stop_circle</span>
            </button>
        </div>
    </footer>
</body>

</html>
