<!DOCTYPE html>

<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Inter:wght@400;500;600&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-surface": "#e4e1e7",
            "on-tertiary-fixed-variant": "#544600",
            "on-primary": "#003739",
            "on-secondary": "#4b007e",
            "surface-dim": "#131317",
            "on-secondary-fixed": "#2d004f",
            "secondary-fixed-dim": "#dfb7ff",
            "on-secondary-container": "#f7e6ff",
            "on-tertiary-container": "#736000",
            "secondary-container": "#9d05ff",
            "on-surface-variant": "#b9caca",
            "error": "#ffb4ab",
            "error-container": "#93000a",
            "surface": "#131317",
            "surface-container-highest": "#353439",
            "primary": "#e9feff",
            "on-error-container": "#ffdad6",
            "surface-variant": "#353439",
            "surface-container": "#1f1f23",
            "surface-container-low": "#1b1b1f",
            "on-primary-container": "#006c71",
            "outline-variant": "#3a494a",
            "primary-fixed-dim": "#00dce5",
            "tertiary-container": "#ffdb3f",
            "surface-bright": "#39393d",
            "inverse-surface": "#e4e1e7",
            "background": "#131317",
            "on-tertiary-fixed": "#221b00",
            "on-tertiary": "#3a3000",
            "secondary-fixed": "#f1daff",
            "on-secondary-fixed-variant": "#6b00b0",
            "on-primary-fixed-variant": "#004f53",
            "outline": "#849495",
            "surface-container-lowest": "#0e0e12",
            "tertiary-fixed-dim": "#e7c427",
            "inverse-primary": "#00696e",
            "tertiary-fixed": "#ffe16c",
            "inverse-on-surface": "#303034",
            "on-background": "#e4e1e7",
            "surface-container-high": "#2a2a2e",
            "tertiary": "#fff9f0",
            "secondary": "#dfb7ff",
            "primary-fixed": "#63f7ff",
            "on-error": "#690005",
            "surface-tint": "#00dce5",
            "primary-container": "#00f5ff",
            "on-primary-fixed": "#002021"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "md": "16px",
            "xxl": "80px",
            "sm": "8px",
            "lg": "24px",
            "xl": "40px",
            "xs": "4px"
          },
          "fontFamily": {
            "metric-xl": ["Space Grotesk"],
            "label-bold": ["Space Grotesk"],
            "body-lg": ["Inter"],
            "display-xl": ["Space Grotesk"],
            "body-md": ["Inter"],
            "headline-md": ["Space Grotesk"],
            "headline-lg": ["Space Grotesk"]
          },
          "fontSize": {
            "metric-xl": ["48px", { "lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "label-bold": ["14px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }],
            "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "display-xl": ["72px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
            "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
            "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
            "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }]
          }
        },
      },
    }
  </script>
  <style>
    .cyber-grid {
      background-image: linear-gradient(to right, rgba(0, 245, 255, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0, 245, 255, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .glass-card {
      backdrop-filter: blur(12px);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.02) 100%);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .neon-glow {
      box-shadow: 0 0 16px 0px rgba(0, 245, 255, 0.4);
    }

    .medical-line {
      background: linear-gradient(90deg, transparent, #00F5FF, transparent);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body
  class="bg-[#0A0A0B] text-on-surface font-body-md min-h-screen selection:bg-primary-container selection:text-on-primary-container overflow-hidden">
  <!-- HUD Background -->
  <div class="fixed inset-0 cyber-grid pointer-events-none"></div>
  <!-- Top Navigation Shell -->
  <header
    class="bg-[#0A0A0B]/80 backdrop-blur-md flex justify-between items-center w-full px-6 h-16 border-b border-[#00F5FF]/20 relative z-50">
    <div class="flex items-center gap-4">
      <span
        class="material-symbols-outlined text-[#00F5FF] cursor-pointer hover:bg-white/5 p-2 rounded-lg transition-colors active:scale-95 duration-150"
        data-icon="grid_view">grid_view</span>
      <h1
        class="text-[#00F5FF] text-xl font-black italic tracking-tighter drop-shadow-[0_0_10px_rgba(0,245,255,0.5)] font-metric-xl">
        NEON_OS</h1>
    </div>
    <div class="flex items-center gap-6">
      <nav class="hidden md:flex gap-8">
        <a class="text-[#00F5FF] font-label-bold text-label-bold uppercase tracking-widest transition-colors"
          href="#">Performance</a>
        <a class="text-white/40 font-label-bold text-label-bold uppercase tracking-widest hover:text-[#00F5FF] transition-colors"
          href="#">Network</a>
        <a class="text-white/40 font-label-bold text-label-bold uppercase tracking-widest hover:text-[#00F5FF] transition-colors"
          href="#">Armory</a>
      </nav>
      <div
        class="w-10 h-10 rounded-full border-2 border-[#00F5FF]/50 p-0.5 overflow-hidden active:scale-95 duration-150 cursor-pointer">
        <img alt="User Profile" class="w-full h-full object-cover rounded-full"
          data-alt="A professional headshot of a high-tech athlete with neon blue highlights in their hair. They are wearing a matte black sleek compression suit with glowing cyan circuitry patterns. The background is a dark, futuristic laboratory setting with soft focus on holographic data displays. High-contrast lighting with cool blue tones dominates the atmosphere."
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuBgiumaQxecKy2LkFQQleQAHnQ-Issu78vre6RSm4q-NpkL2l-7iZzfaojtnWrECnisjHmI8R290R1yty_tXFuxU_ojqcY5e2qdyRpe0TBbNGGn1W6avc40KsSdH1gqBGoFCV7dNY6PVcik6f_aKqiherbr1BMDd0Ku_nZdScRsRSxkO7QfyeCR_mah3ed5EA5AZNlIRiPoxM3hjLJYiX1OJ3T25FmWNmS1-Hghhpx-IwTgC040Tmq3tVXigwUNCe3cqG_kO5Ags6Q" />
      </div>
    </div>
  </header>
  <main class="relative flex flex-col items-center justify-center min-h-[calc(100vh-144px)] px-6 py-10 z-10">
    <!-- Share Card Wrapper -->
    <div
      class="relative w-full max-w-5xl aspect-video md:aspect-[21/9] flex items-center justify-between overflow-hidden rounded-xl bg-black/40 border border-white/5 p-8">
      <!-- Background Visualization Content -->
      <div class="absolute inset-0 flex items-center justify-center opacity-40 md:opacity-100">
        <div class="relative w-full h-full flex items-center justify-center">
          <!-- Central Hologram Image -->
          <img alt="Body Performance Visualization" class="h-full object-contain mix-blend-screen"
            data-alt="A detailed, minimalist medical-style hologram of a human anatomical figure in a running pose. The figure is constructed from fine neon cyan lines and glowing dots against a deep black background. The leg muscles—quadriceps, hamstrings, and calves—are specifically highlighted with intense luminous cyan energy, indicating high activity. The aesthetic is clean, technological, and high-performance, resembling a high-end futuristic athletic HUD."
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuClEXBR3rQnkuVsHMiz58PyBgWjX4_ku79wYXmT4o0JFXdUfUgyzBuB3O-pKLfHHpeAPFQLRMiep8DA_qir2vcM7hnXJzJ1KxJGh6ZGgwEr5EFVKQhSqmJRENMenzA38ne2gGsm2yG7mWrYMpVFg9tgqJvNbPOTwR-lmRrFkmwV1oEfi_D7TunzuVmErHwynvOr90elKuXeM9UzZ9KU4KANuQJZnu4a1XCCaGPT6ZQsuWseniqyroX6VK3WRs5zKIGhG_5aBNf5Ba0" />
          <!-- Pulsing UI Elements -->
          <div class="absolute inset-0 bg-radial-gradient from-[#00F5FF]/10 to-transparent pointer-events-none"></div>
        </div>
      </div>
      <!-- Left Metrics Column -->
      <div class="relative z-20 flex flex-col gap-6 w-full md:w-64">
        <div class="glass-card p-6 rounded-xl flex flex-col gap-1 border-l-4 border-l-primary-container">
          <span class="text-white/40 font-label-bold text-[10px] uppercase tracking-[0.2em]">Distance</span>
          <div class="flex items-baseline gap-2">
            <span class="text-[#00F5FF] font-metric-xl text-metric-xl">12.4</span>
            <span class="text-white/60 font-label-bold text-label-bold">KM</span>
          </div>
        </div>
        <div class="glass-card p-6 rounded-xl flex flex-col gap-1 border-l-4 border-l-secondary-container">
          <span class="text-white/40 font-label-bold text-[10px] uppercase tracking-[0.2em]">Pace</span>
          <div class="flex items-baseline gap-2">
            <span class="text-white font-metric-xl text-metric-xl">5:24</span>
            <span class="text-white/60 font-label-bold text-label-bold">MIN/KM</span>
          </div>
        </div>
        <div class="glass-card p-6 rounded-xl flex flex-col gap-1">
          <span class="text-white/40 font-label-bold text-[10px] uppercase tracking-[0.2em]">Duration</span>
          <div class="flex items-baseline gap-2">
            <span class="text-white font-metric-xl text-metric-xl">1:07:22</span>
          </div>
        </div>
      </div>
      <!-- Right Metrics Column -->
      <div class="relative z-20 flex flex-col gap-6 w-full md:w-64 items-end text-right">
        <div class="glass-card p-6 rounded-xl flex flex-col gap-1 border-r-4 border-r-[#FFDB3F] w-full">
          <span class="text-white/40 font-label-bold text-[10px] uppercase tracking-[0.2em]">Energy Exhaustion</span>
          <div class="flex items-baseline justify-end gap-2">
            <span class="text-[#FFDB3F] font-metric-xl text-metric-xl">840</span>
            <span class="text-white/60 font-label-bold text-label-bold">KCAL</span>
          </div>
        </div>
        <div class="glass-card p-6 rounded-xl flex flex-col gap-1 border-r-4 border-r-error w-full">
          <span class="text-white/40 font-label-bold text-[10px] uppercase tracking-[0.2em]">Avg Heart Rate</span>
          <div class="flex items-baseline justify-end gap-2">
            <span class="text-error font-metric-xl text-metric-xl">164</span>
            <span class="text-white/60 font-label-bold text-label-bold">BPM</span>
          </div>
        </div>
        <!-- Session Tag -->
        <div
          class="mt-auto px-4 py-2 bg-primary-container text-on-primary font-label-bold text-label-bold uppercase skew-x-[-12deg] neon-glow">
          Verified Session
        </div>
      </div>
      <!-- Overlay Labels for Hologram -->
      <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[400px] h-[500px] pointer-events-none hidden lg:block">
        <!-- Data Tag 1 -->
        <div class="absolute top-[60%] -left-12 flex items-center gap-2">
          <div class="h-px w-20 medical-line"></div>
          <div
            class="px-2 py-1 bg-black/80 border border-[#00F5FF]/40 text-[#00F5FF] text-[10px] font-bold uppercase tracking-wider">
            Lateral Quad Scan: OPTIMAL</div>
        </div>
        <!-- Data Tag 2 -->
        <div class="absolute bottom-[20%] -right-8 flex items-center flex-row-reverse gap-2">
          <div class="h-px w-24 medical-line"></div>
          <div
            class="px-2 py-1 bg-black/80 border border-[#00F5FF]/40 text-[#00F5FF] text-[10px] font-bold uppercase tracking-wider">
            Fiber Recruitment: 88%</div>
        </div>
      </div>
    </div>
    <!-- Action Bar -->
    <div class="mt-12 flex gap-6">
      <button
        class="bg-primary-container text-on-primary px-8 py-3 font-label-bold text-label-bold uppercase flex items-center gap-3 active:scale-95 transition-all neon-glow">
        <span class="material-symbols-outlined" data-icon="share">share</span>
        Export Share Card
      </button>
      <button
        class="border border-white/20 text-white hover:bg-white/5 px-8 py-3 font-label-bold text-label-bold uppercase flex items-center gap-3 active:scale-95 transition-all">
        <span class="material-symbols-outlined" data-icon="save">save</span>
        Save To Vault
      </button>
    </div>
  </main>
  <!-- Bottom Navigation Shell -->
  <nav
    class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-4 bg-[#0A0A0B]/90 backdrop-blur-xl border-t border-[#00F5FF]/30 shadow-[0_-5px_25px_rgba(0,245,255,0.15)] rounded-t-2xl">
    <button
      class="flex flex-col items-center justify-center text-[#00F5FF] drop-shadow-[0_0_12px_rgba(0,245,255,0.9)] scale-110 font-metric-xl">
      <span class="material-symbols-outlined" data-icon="bolt">bolt</span>
      <span class="text-[10px] font-medium font-['Space_Grotesk']">STRIKE</span>
    </button>
    <button class="flex flex-col items-center justify-center text-white/30 hover:text-[#00F5FF]/80 transition-colors">
      <span class="material-symbols-outlined" data-icon="monitoring">monitoring</span>
      <span class="text-[10px] font-medium font-['Space_Grotesk']">METRICS</span>
    </button>
    <button class="flex flex-col items-center justify-center text-white/30 hover:text-[#00F5FF]/80 transition-colors">
      <span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
      <span class="text-[10px] font-medium font-['Space_Grotesk']">RANK</span>
    </button>
    <button class="flex flex-col items-center justify-center text-white/30 hover:text-[#00F5FF]/80 transition-colors">
      <span class="material-symbols-outlined" data-icon="share" data-weight="fill"
        style="font-variation-settings: 'FILL' 1;">share</span>
      <span class="text-[10px] font-medium font-['Space_Grotesk']">SHARE</span>
    </button>
  </nav>
  <!-- FAB Content -->
  <button
    class="fixed bottom-24 right-8 w-14 h-14 bg-primary-container text-on-primary rounded-full flex items-center justify-center shadow-[0_0_20px_rgba(0,245,255,0.6)] active:scale-95 transition-all z-40">
    <span class="material-symbols-outlined" data-icon="add">add</span>
  </button>
</body>

</html>
