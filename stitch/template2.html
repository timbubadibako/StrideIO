<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>STRIDE_IO Performance Snapshot</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&amp;family=Inter:wght@400;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"

    <style>
        .cyber-grid {
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .glass-card {
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
        }

        .neon-glow-cyan {
            filter: drop-shadow(0 0 8px rgba(0, 245, 255, 0.6));
        }

        .holographic-path {
            stroke-dasharray: 4;
            filter: drop-shadow(0 0 4px rgba(0, 245, 255, 0.8));
        }

    <style>
        body {
            min-height: max(884px, 100dvh);

        <div class="flex items-center gap-4">
            <span
                class="material-symbols-outlined text-[#00F5FF] active:scale-95 transition-transform cursor-pointer">grid_view</span>
            <span
                class="font-['Space_Grotesk'] font-black text-[#00F5FF] tracking-tighter italic drop-shadow-[0_0_10px_rgba(0,245,255,0.6)] uppercase text-xs">STRIDE_IO</span>
        </div>
        <div class="h-8 w-8 rounded-full border border-primary-container overflow-hidden">
            <img class="w-full h-full object-cover"
                data-alt="A close-up portrait of a determined urban athlete with faint holographic data projections on their face. The lighting is moody and cinematic with deep shadows and vibrant neon cyan rim lighting. The overall style is a high-octane cyberpunk aesthetic, featuring high contrast and a polished digital finish that aligns with the performance brand identity."
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuDrwOOdWoRel_g2FwDqWl0dkcI5_2batuhVma-yiZYPqNOryTjnWE7Guo1SK3peywjPY9yarYx3JToInstxID8Vu_C2C1PemreO23s1kzbljdHLE8qRCh9eqp5OrwynBez58eLo41F7PM2DYZJ7ALJoVMgKdPl0pREHChNJW8yZzEqqB7gOW2DS9YVEel16FlxXPAMPXah3VwEJb9stKpL27WbQUh8AYRceMBoi8Nvs4BzJX64OAe_UdFNWQHys_97LZ7anAqxIzaI" />
        </div>
    </header>
    <!-- Main Content Canvas -->
    <main
        class="cyber-grid w-full max-w-[600px] aspect-square relative overflow-hidden rounded-xl border border-white/10 shadow-2xl">
        <!-- Background Image with Filter -->
        <div class="absolute inset-0 z-0">
            <img class="w-full h-full object-cover opacity-50 contrast-125 brightness-50"
                data-alt="A dynamic wide shot of a runner in mid-stride on a dark, wet urban bridge at twilight. The scene is saturated with deep blues and blacks, with glowing neon city lights in the far distance. A subtle motion blur emphasizes speed, while the overall mood is intense, focused, and high-performance, fitting a cinematic gaming aesthetic."
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBke3iD7uy3kVHNmwP5JgqQ-YDHH1Ngw2Mw9YuAAykEwLiHmMPJKHyCsfDwd9BRXb4LmWlKyQOYGC8yG1px_8SKpQIXP3-_3rY03EhO7SVJCZEL-ZgRDChLyBiVzNz6Gamnjqdkxs3FsgZJjquOfgWWcbLfyFyZ_zRpu_jKwrRC6QZgOIaLlnjsZ7ajdlvQVod0PKZA19YeeKS6_RSPKyv3EpnJjNTPWWN-c4Yke-CRUZQOY3n1HH9nheeWNo7kelN_IsHGBBlEcv0" />

            </div>
        </div>
        <!-- Decorative UI Elements -->
        <div class="absolute inset-0 z-10 pointer-events-none p-lg flex flex-col justify-between">
            <!-- Header Section (Top Right) -->
            <div class="flex flex-col items-end">
                <div class="flex items-baseline gap-1 group">
                    <span
                        class="font-headline-md text-primary-container font-black tracking-tighter italic drop-shadow-[0_0_12px_rgba(0,245,255,0.5)] cursor-default">STRIDE_IO</span>
                    <div class="h-1 w-4 bg-secondary shadow-[0_0_8px_#dfb7ff]"></div>
                </div>
                <span class="font-label-bold text-zinc-500 text-[10px] tracking-[0.3em] uppercase -mt-1">SOCIAL
                    GRID</span>
            </div>
            <!-- Central Holographic Route -->
            <div class="absolute inset-0 flex items-center justify-center opacity-80">
                <svg class="w-2/3 h-2/3" viewbox="0 0 200 200">
                    <path class="holographic-path" d="M40,160 Q60,120 100,100 T160,40" fill="none" stroke="#00F5FF"
                        stroke-width="1.5"></path>
                    <circle class="neon-glow-cyan" cx="40" cy="160" fill="#00F5FF" r="3"></circle>
                    <circle class="drop-shadow-[0_0_5px_#dfb7ff]" cx="160" cy="40" fill="#dfb7ff" r="3"></circle>
                    <text class="font-label-bold text-[8px]" fill="#00F5FF" font-family="Space Grotesk" x="35"
                        y="175">START</text>
                    <text class="font-label-bold text-[8px]" fill="#dfb7ff" font-family="Space Grotesk" x="155"
                        y="30">GOAL</text>
                </svg>
            </div>
            <!-- Data Block (Bottom Left) -->
            <div class="w-fit">
                <div class="glass-card p-md rounded-lg flex flex-col gap-sm">
                    <div class="flex gap-md">
                        <div class="flex flex-col">
                            <span class="font-label-bold text-zinc-500 text-[10px] uppercase">Distance</span>
                            <span class="font-metric-xl text-primary-container leading-none">12.4<span
                                    class="text-headline-md ml-1 opacity-70">KM</span></span>
                        </div>
                        <div class="w-px h-full bg-white/10"></div>
                        <div class="flex flex-col">
                            <span class="font-label-bold text-zinc-500 text-[10px] uppercase">Pace</span>
                            <span class="font-metric-xl text-on-surface leading-none">5:24</span>
                        </div>
                    </div>
                    <div class="h-px w-full bg-white/10"></div>
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col">
                            <span class="font-label-bold text-zinc-500 text-[10px] uppercase">Time</span>
                            <span class="font-headline-md text-on-surface">1:07:22</span>
                        </div>
                        <div class="flex gap-xs items-center">
                            <div class="w-1.5 h-1.5 rounded-full bg-secondary shadow-[0_0_8px_#dfb7ff]"></div>
                            <span class="font-label-bold text-secondary text-[10px]">ELITE RANK</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <!-- Corner Scanning Accents -->
        <div class="absolute top-0 left-0 w-12 h-12 border-t-2 border-l-2 border-primary-container/40 m-md"></div>
        <div class="absolute bottom-0 right-0 w-12 h-12 border-b-2 border-r-2 border-secondary/40 m-md"></div>
    </main>
    <!-- Bottom Navigation Shell -->
    <nav
        class="fixed bottom-0 w-full z-50 flex justify-around items-center h-20 bg-zinc-950/80 backdrop-blur-xl border-t border-white/5 shadow-[0_-8px_32px_rgba(0,0,0,0.8)] pb-safe px-4 md:hidden">

            <span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-tighter">DASHBOARD</span>

        <button

            <span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-tighter">DOMINANCE</span>
        </button>
        <button
            class="flex flex-col items-center justify-center text-[#00F5FF] drop-shadow-[0_0_8px_rgba(0,245,255,0.8)] scale-110 active:scale-90 transition-all duration-150 ease-out">
            <span class="material-symbols-outlined">analytics</span>
            <span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-tighter">SNAPSHOT</span>
        </button>
        <button
            class="flex flex-col items-center justify-center text-zinc-600 opacity-60 hover:opacity-100 active:scale-90 transition-all duration-150 ease-out">
            <span class="material-symbols-outlined">hub</span>
            <span class="font-['Space_Grotesk'] font-bold text-[10px] tracking-tighter">CIRCUIT</span>
        </button>
    </nav>

</html>
