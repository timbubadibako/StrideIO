<!DOCTYPE html>

<html class="dark" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800;900&amp;family=Inter:wght@400;500;600&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <link
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          "colors": {
            "on-surface": "#e4e1e7",
            "on-tertiary-fixed-variant": "#544600",
            "on-primary": "#003739",
            "on-secondary": "#4b007e",
            "surface-dim": "#131317",
            "on-secondary-fixed": "#2d004f",
            "secondary-fixed-dim": "#dfb7ff",
            "on-secondary-container": "#f7e6ff",
            "on-tertiary-container": "#736000",
            "secondary-container": "#9d05ff",
            "on-surface-variant": "#b9caca",
            "error": "#ffb4ab",
            "error-container": "#93000a",
            "surface": "#131317",
            "surface-container-highest": "#353439",
            "primary": "#e9feff",
            "on-error-container": "#ffdad6",
            "surface-variant": "#353439",
            "surface-container": "#1f1f23",
            "surface-container-low": "#1b1b1f",
            "on-primary-container": "#006c71",
            "outline-variant": "#3a494a",
            "primary-fixed-dim": "#00dce5",
            "tertiary-container": "#ffdb3f",
            "surface-bright": "#39393d",
            "inverse-surface": "#e4e1e7",
            "background": "#131317",
            "on-tertiary-fixed": "#221b00",
            "on-tertiary": "#3a3000",
            "secondary-fixed": "#f1daff",
            "on-secondary-fixed-variant": "#6b00b0",
            "on-primary-fixed-variant": "#004f53",
            "outline": "#849495",
            "surface-container-lowest": "#0e0e12",
            "tertiary-fixed-dim": "#e7c427",
            "inverse-primary": "#00696e",
            "tertiary-fixed": "#ffe16c",
            "inverse-on-surface": "#303034",
            "on-background": "#e4e1e7",
            "surface-container-high": "#2a2a2e",
            "tertiary": "#fff9f0",
            "secondary": "#dfb7ff",
            "primary-fixed": "#63f7ff",
            "on-error": "#690005",
            "surface-tint": "#00dce5",
            "primary-container": "#00f5ff",
            "on-primary-fixed": "#002021"
          },
          "borderRadius": {
            "DEFAULT": "0.125rem",
            "lg": "0.25rem",
            "xl": "0.5rem",
            "full": "0.75rem"
          },
          "spacing": {
            "md": "16px",
            "xxl": "80px",
            "sm": "8px",
            "lg": "24px",
            "xl": "40px",
            "xs": "4px"
          },
          "fontFamily": {
            "metric-xl": ["Space Grotesk"],
            "label-bold": ["Space Grotesk"],
            "body-lg": ["Inter"],
            "display-xl": ["Space Grotesk"],
            "body-md": ["Inter"],
            "headline-md": ["Space Grotesk"],
            "headline-lg": ["Space Grotesk"]
          },
          "fontSize": {
            "metric-xl": ["48px", { "lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
            "label-bold": ["14px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }],
            "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
            "display-xl": ["72px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
            "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
            "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
            "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }]
          }
        },
      },
    }
  </script>
  <style>
    .cyber-grid {
      background-image: linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .neon-tube {
      filter: drop-shadow(0 0 4px #00F5FF) drop-shadow(0 0 12px #00F5FF) drop-shadow(0 0 20px rgba(0, 245, 255, 0.4));
    }

    .glass-card {
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
    }
  </style>
  <style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>

<body
  class="bg-[#000000] text-on-surface font-body-md selection:bg-primary-container selection:text-on-primary-container min-h-screen overflow-x-hidden">
  <!-- Top Navigation (Shell suppressed for Share Card focus, but TopAppBar layout used as reference) -->
  <header
    class="bg-[#0A0A0B]/80 backdrop-blur-md text-[#00F5FF] flex justify-between items-center w-full px-6 h-16 fixed top-0 z-50 border-b border-[#00F5FF]/20">
    <div class="flex items-center gap-4">
      <span class="material-symbols-outlined text-[#00F5FF]" data-icon="grid_view">grid_view</span>
      <h1
        class="text-[#00F5FF] text-xl font-black italic tracking-tighter drop-shadow-[0_0_10px_rgba(0,245,255,0.5)] font-['Space_Grotesk'] uppercase">
        NEON_OS</h1>
    </div>
    <div class="flex items-center gap-6">
      <span
        class="text-white/40 hover:text-[#00F5FF] hover:bg-white/5 transition-colors font-['Space_Grotesk'] font-bold tracking-widest uppercase cursor-pointer hidden md:block">Stats</span>
      <span
        class="text-[#00F5FF] font-['Space_Grotesk'] font-bold tracking-widest uppercase cursor-pointer hidden md:block">Share</span>
      <div class="w-10 h-10 rounded-full border border-[#00F5FF]/30 p-0.5 overflow-hidden">
        <img alt="User profile" class="w-full h-full object-cover rounded-full"
          data-alt="A professional headshot of an athlete with subtle cyan neon lighting reflections on their face. The background is a deep, blurred dark technological environment. The person has a determined expression, fitting the high-performance gaming and athletic aesthetic of the brand."
          src="https://lh3.googleusercontent.com/aida-public/AB6AXuDd0pcW0sXQh1kxGafpDFk_AF8h0R5MAhFT-mvj78Uz_3HbB2sSRd0UAb8Fy-80yW201Ej99X9zLKKI6f5FH8qO1JtBbzXXsKwhD6-Rj6qrOz5_ObsdQHcqxCDA4X4WvqJQkrz8OnUQ4eBR494usXqzBFfKlV4ppxQwS9pdZNzr3NsEw45zueQYtcFGAuH_zxVepvi4ZZDhiEHTawOd9DbcTf5Vfna7s6xvEpasJjHlZfLez_T_CWJDDmMg90oiTG9XmKBq0jm1Lzk" />
      </div>
    </div>
  </header>
  <!-- Main Canvas -->
  <main class="relative flex items-center justify-center min-h-screen px-4 pt-16 pb-24 cyber-grid">
    <!-- Share Card Container -->
    <div
      class="relative w-full max-w-[420px] aspect-[4/5] bg-black shadow-[0_0_80px_rgba(0,245,255,0.1)] rounded-xl overflow-hidden flex flex-col items-center justify-center p-md">
      <!-- Pure Path Content -->
      <div class="relative w-full h-full flex flex-col justify-between">
        <!-- Header Info (Minimal) -->
        <div class="flex justify-between items-start w-full">
          <div class="glass-card px-3 py-1 rounded-full">
            <span class="font-label-bold text-label-bold text-[#00F5FF] uppercase tracking-widest">PURE PATH /
              001</span>
          </div>
          <div class="text-white/20">
            <span class="material-symbols-outlined text-[20px]" data-icon="bolt">bolt</span>
          </div>
        </div>
        <!-- Main Visual: The Run Route -->
        <div class="absolute inset-0 flex items-center justify-center pointer-events-none p-12">
          <svg class="w-full h-full neon-tube opacity-90" preserveaspectratio="xMidYMid meet" viewbox="0 0 200 200">
            <!-- Abstracted Run Route -->
            <path
              d="M 40,160 C 40,160 30,120 60,110 C 90,100 80,60 120,50 C 160,40 170,100 140,120 C 110,140 150,170 110,180"
              fill="none" stroke="#00F5FF" stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"></path>
            <!-- Start Point -->
            <circle cx="40" cy="160" fill="#00F5FF" r="2"></circle>
            <!-- End Point (Pulse effect handled by aesthetic) -->
            <circle class="animate-pulse" cx="110" cy="180" fill="#00F5FF" r="3"></circle>
          </svg>
        </div>
        <!-- Stats Footer -->
        <div class="flex justify-between items-end w-full">
          <div class="flex flex-col">
            <span
              class="font-['Space_Grotesk'] font-light text-[56px] text-white leading-none tracking-tighter">12.4</span>
            <span class="font-label-bold text-label-bold text-white/50 -mt-1 ml-1 uppercase">Kilometers</span>
          </div>
          <!-- Watermark -->
          <div class="flex flex-col items-end opacity-30 pb-1">
            <span
              class="text-[#00F5FF] text-lg font-black italic tracking-tighter font-['Space_Grotesk'] uppercase leading-none">StrideIO</span>
            <span class="font-label-bold text-[8px] text-[#00F5FF] tracking-[0.3em] uppercase">Telemetry Protocol</span>
          </div>
        </div>
      </div>
      <!-- Subtle Aesthetic Elements -->
      <div class="absolute top-0 left-0 w-full h-full pointer-events-none">
        <!-- Vingette -->
        <div class="absolute inset-0 bg-radial-gradient from-transparent to-black/60"></div>
        <!-- Precision Markers -->
        <div class="absolute top-md right-md flex gap-1">
          <div class="w-1 h-4 bg-[#00F5FF]/40"></div>
          <div class="w-1 h-2 bg-[#00F5FF]/20"></div>
        </div>
        <div class="absolute bottom-md left-md flex gap-1 transform rotate-180">
          <div class="w-1 h-4 bg-[#00F5FF]/40"></div>
          <div class="w-1 h-2 bg-[#00F5FF]/20"></div>
        </div>
      </div>
    </div>
    <!-- Call to Action (Floating over grid) -->
    <div class="fixed bottom-24 left-1/2 -translate-x-1/2 flex gap-4">
      <button
        class="bg-[#00F5FF] text-black font-label-bold text-label-bold px-8 py-4 rounded-none hover:shadow-[0_0_20px_rgba(0,245,255,0.6)] transition-all active:scale-95 uppercase flex items-center gap-2">
        <span class="material-symbols-outlined" data-icon="share">share</span>
        Export Assets
      </button>
      <button
        class="border border-[#00F5FF] text-[#00F5FF] font-label-bold text-label-bold px-8 py-4 rounded-none hover:bg-[#00F5FF]/10 transition-all active:scale-95 uppercase flex items-center gap-2">
        <span class="material-symbols-outlined" data-icon="brush">brush</span>
        Customize
      </button>
    </div>
  </main>
  <!-- Bottom Navigation (Following Shared Component JSON) -->
  <nav
    class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-20 px-4 pb-4 bg-[#0A0A0B]/90 backdrop-blur-xl border-t border-[#00F5FF]/30 shadow-[0_-5px_25px_rgba(0,245,255,0.15)]">
    <div
      class="flex flex-col items-center justify-center text-white/30 hover:text-[#00F5FF]/80 transition-colors cursor-pointer group">
      <span class="material-symbols-outlined" data-icon="bolt">bolt</span>
      <span class="font-['Space_Grotesk'] text-[10px] font-medium uppercase mt-1">Power</span>
    </div>
    <div
      class="flex flex-col items-center justify-center text-white/30 hover:text-[#00F5FF]/80 transition-colors cursor-pointer group">
      <span class="material-symbols-outlined" data-icon="monitoring">monitoring</span>
      <span class="font-['Space_Grotesk'] text-[10px] font-medium uppercase mt-1">Metrics</span>
    </div>
    <div
      class="flex flex-col items-center justify-center text-white/30 hover:text-[#00F5FF]/80 transition-colors cursor-pointer group">
      <span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
      <span class="font-['Space_Grotesk'] text-[10px] font-medium uppercase mt-1">Ranks</span>
    </div>
    <div
      class="flex flex-col items-center justify-center text-[#00F5FF] drop-shadow-[0_0_12px_rgba(0,245,255,0.9)] scale-110 transition-transform cursor-pointer group">
      <span class="material-symbols-outlined" data-icon="share">share</span>
      <span class="font-['Space_Grotesk'] text-[10px] font-medium uppercase mt-1">Export</span>
    </div>
  </nav>
  <!-- Background Decoration -->
  <div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden">
    <div class="absolute top-1/4 -left-1/4 w-1/2 h-1/2 bg-[#00F5FF]/5 blur-[120px] rounded-full"></div>
    <div class="absolute bottom-1/4 -right-1/4 w-1/2 h-1/2 bg-secondary-container/5 blur-[120px] rounded-full"></div>
  </div>
</body>

</html>
