<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>StrideIO - Social &amp; Party</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@600;700;900&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "error": "#ffb4ab",
                        "on-primary": "#003739",
                        "tertiary-fixed-dim": "#e7c427",
                        "error-container": "#93000a",
                        "tertiary": "#fff9f0",
                        "on-surface-variant": "#b9caca",
                        "secondary": "#dfb7ff",
                        "on-tertiary": "#3a3000",
                        "primary-container": "#00f5ff",
                        "on-secondary-fixed": "#2d004f",
                        "surface-container-highest": "#353439",
                        "inverse-primary": "#00696e",
                        "on-secondary-fixed-variant": "#6b00b0",
                        "primary-fixed-dim": "#00dce5",
                        "surface-bright": "#39393d",
                        "on-primary-fixed-variant": "#004f53",
                        "inverse-on-surface": "#303034",
                        "surface-container": "#1f1f23",
                        "on-tertiary-fixed-variant": "#544600",
                        "on-tertiary-fixed": "#221b00",
                        "secondary-fixed-dim": "#dfb7ff",
                        "on-secondary": "#4b007e",
                        "secondary-container": "#9d05ff",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#ffe16c",
                        "on-tertiary-container": "#736000",
                        "background": "#131317",
                        "on-secondary-container": "#f7e6ff",
                        "surface": "#131317",
                        "on-primary-fixed": "#002021",
                        "surface-container-lowest": "#0e0e12",
                        "primary": "#e9feff",
                        "inverse-surface": "#e4e1e7",
                        "on-primary-container": "#006c71",
                        "surface-tint": "#00dce5",
                        "outline-variant": "#3a494a",
                        "surface-variant": "#353439",
                        "surface-dim": "#131317",
                        "primary-fixed": "#63f7ff",
                        "surface-container-high": "#2a2a2e",
                        "on-surface": "#e4e1e7",
                        "secondary-fixed": "#f1daff",
                        "outline": "#849495",
                        "tertiary-container": "#ffdb3f",
                        "on-error": "#690005",
                        "surface-container-low": "#1b1b1f",
                        "on-background": "#e4e1e7"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "spacing": {
                        "xl": "40px",
                        "sm": "8px",
                        "md": "16px",
                        "lg": "24px",
                        "xs": "4px",
                        "xxl": "80px"
                    },
                    "fontFamily": {
                        "metric-xl": ["Space Grotesk"],
                        "body-lg": ["Inter"],
                        "label-bold": ["Space Grotesk"],
                        "body-md": ["Inter"],
                        "display-xl": ["Space Grotesk"],
                        "headline-md": ["Space Grotesk"],
                        "headline-lg": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "metric-xl": ["48px", { "lineHeight": "1", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-bold": ["14px", { "lineHeight": "1", "letterSpacing": "0.1em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "display-xl": ["72px", { "lineHeight": "1.1", "letterSpacing": "-0.04em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "headline-lg": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "600" }]
                    }
                }
            }
        }
    </script>
    <style>
        .cyber-grid {
            background-image:
                linear-gradient(to right, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .glass-card {
            background: rgba(31, 31, 35, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        .neon-glow {
            box-shadow: 0 0 16px rgba(0, 245, 255, 0.5);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-background text-on-background min-h-screen relative font-body-md text-body-md selection:bg-primary-container selection:text-on-primary-container">
    <!-- Ambient Grid Background -->
    <div class="fixed inset-0 pointer-events-none z-[-1] cyber-grid"></div>
    <!-- TopAppBar Shared Component -->
    <header
        class="fixed top-0 w-full z-40 bg-zinc-950/80 backdrop-blur-xl border-b border-cyan-500/30 shadow-[0_0_20px_rgba(0,245,255,0.15)] flex justify-between items-center px-6 py-4">
        <button
            class="text-zinc-500 hover:text-cyan-300 transition-all duration-150 active:scale-95 flex items-center justify-center">
            <span class="material-symbols-outlined">location_on</span>
        </button>
        <h1
            class="font-space-grotesk font-bold uppercase tracking-widest text-cyan-400 font-black italic tracking-tighter">
            STRIDEIO</h1>
        <button
            class="text-zinc-500 hover:text-cyan-300 transition-all duration-150 active:scale-95 flex items-center justify-center">
            <span class="material-symbols-outlined">leaderboard</span>
        </button>
    </header>
    <!-- Main Canvas -->
    <main class="pt-[80px] pb-[100px] px-md md:px-lg max-w-7xl mx-auto flex flex-col gap-lg">
        <!-- Header Section -->
        <div class="flex flex-col gap-sm mt-md">
            <h2 class="font-headline-lg text-headline-lg text-primary-fixed drop-shadow-[0_0_8px_rgba(0,245,255,0.3)]">
                PARTY HUB</h2>
            <p class="font-body-md text-body-md text-on-surface-variant">Connect with nearby operatives and dominate the
                grid.</p>
        </div>
        <!-- Bento Grid Layout -->
        <div class="grid grid-cols-1 md:grid-cols-12 gap-md">
            <!-- Quick Join QR (Spans 4 cols on larger screens) -->
            <div
                class="glass-card rounded-xl p-lg md:col-span-4 flex flex-col items-center justify-center gap-md relative overflow-hidden group">
                <!-- Decorative Corner -->
                <div
                    class="absolute top-0 right-0 w-8 h-8 border-t-2 border-r-2 border-primary-container m-sm opacity-50">
                </div>
                <h3
                    class="font-label-bold text-label-bold text-on-surface tracking-widest uppercase self-start w-full border-b border-white/5 pb-sm mb-sm">
                    Sync Code</h3>
                <div
                    class="p-sm bg-surface-container-highest rounded-lg border border-primary-container/50 shadow-[0_0_20px_rgba(0,245,255,0.2)] group-hover:shadow-[0_0_30px_rgba(0,245,255,0.4)] transition-shadow duration-300">
                    <!-- Placeholder for QR Code Image -->
                    <img alt="QR Code"
                        class="w-32 h-32 object-cover rounded mix-blend-screen opacity-80 filter contrast-125 sepia-[.5] hue-rotate-[180deg]"
                        data-alt="A high-contrast, cyberpunk-style QR code graphic rendered in stark black and neon cyan. The code pattern is complex and technical, surrounded by a subtle digital glow effect against a dark, metallic background. The lighting highlights the crisp edges of the digital squares, creating a sense of secure, high-tech access."
                        src="https://lh3.googleusercontent.com/aida-public/AB6AXuAmKk6K8wCfz-8OGOS29XfG3YRYKmBKwCtt1V58LBpL0vGqKJRx9KQJbAL9QemCTW8Jm_YN6jgFrJPLOsVSEcSs4VipCtzaQ4Fc-b43iD6SeyitPw4nzN8jCaMwsFsHA3EvAoUNLy4weOqB7HJNQmlsW42SNlwtCwudES1ztxkyM-Ioph7sMtVuukMCPC_0HsqGvZlCIB6jdY54iS9nmkw_kLm5hkfhYXJ2aNIY5MM_-5Wg_pWwACQ-l1GNaqg5mSAWfzgKxN5IpuM" />
                </div>
                <button
                    class="mt-xs bg-primary-container text-on-primary-container font-label-bold text-label-bold px-md py-sm rounded w-full active:scale-95 transition-transform">
                    SCAN TO JOIN
                </button>
            </div>
            <!-- Nearby Lobby (Spans 8 cols) -->
            <div class="glass-card rounded-xl p-lg md:col-span-8 flex flex-col gap-md">
                <div class="flex justify-between items-center border-b border-white/5 pb-sm">
                    <h3
                        class="font-label-bold text-label-bold text-on-surface tracking-widest uppercase flex items-center gap-sm">
                        <span class="material-symbols-outlined text-primary-container text-sm">radar</span>
                        Local Lobby
                    </h3>
                    <span
                        class="font-body-md text-body-md text-primary-container bg-primary-container/10 px-sm py-xs rounded text-xs">3
                        Online</span>
                </div>
                <div class="flex flex-col gap-sm">
                    <!-- User Row 1 -->
                    <div
                        class="bg-surface-container/50 border border-white/5 rounded-lg p-sm flex items-center justify-between hover:bg-surface-container transition-colors">
                        <div class="flex items-center gap-md">
                            <div class="relative">
                                <img class="w-10 h-10 rounded-full border border-primary-container/30 object-cover"
                                    data-alt="A striking portrait of a young cyber-athlete wearing a sleek, dark tech-wear jacket. The lighting is moody with strong neon blue and purple rim lights outlining her profile against a deep black background. Her expression is focused and competitive, reflecting a high-octane gaming environment."
                                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuCg5KsAQ6NhLnJvgQDSDpdWXtPKc3EAfhRkoQgjrXopmaWM8tpGnqL5SVHSeBlGHuvvgUaASz4j8oo-r6_gpSe8oa8f8Jqvejd3uCgJcbToH9jANH6BlH5qBPEyaSgCveTy7UEhFifOlkEl-jkmVF2iqe1CKDXn7sv6e9iNFVg03XLoGhnT5zDP3Bp1st9YbNY4exKPx1-H6lwZyLah_tlv6RaNAmVDPTJKfKzsx2geRo2HqYwpVojGKmeZdO8J8CXKGG9uf-UR_No" />
                                <!-- Faction Pip (Blue) -->
                                <div
                                    class="absolute -top-1 -right-1 w-3 h-3 bg-primary-fixed rounded-full border border-background shadow-[0_0_5px_rgba(99,247,255,0.8)]">
                                </div>
                            </div>
                            <div class="flex flex-col">
                                <span
                                    class="font-headline-md text-headline-md text-on-surface text-lg leading-none">Valkyrie_99</span>
                                <span class="font-body-md text-body-md text-on-surface-variant text-sm">Level 42 •
                                    Vector</span>
                            </div>
                        </div>
                        <button
                            class="bg-transparent border border-primary-container text-primary-container font-label-bold text-label-bold px-sm py-xs rounded hover:bg-primary-container hover:text-on-primary-container transition-colors active:scale-95">JOIN</button>
                    </div>
                    <!-- User Row 2 -->
                    <div
                        class="bg-surface-container/50 border border-white/5 rounded-lg p-sm flex items-center justify-between hover:bg-surface-container transition-colors">
                        <div class="flex items-center gap-md">
                            <div class="relative">
                                <div
                                    class="w-10 h-10 rounded-full bg-surface-container-high border border-error/30 flex items-center justify-center text-error font-headline-md">
                                    K</div>
                                <!-- Faction Pip (Red) -->
                                <div
                                    class="absolute -top-1 -right-1 w-3 h-3 bg-error rounded-full border border-background shadow-[0_0_5px_rgba(255,180,171,0.8)]">
                                </div>
                            </div>
                            <div class="flex flex-col">
                                <span
                                    class="font-headline-md text-headline-md text-on-surface text-lg leading-none">Kael_Striker</span>
                                <span class="font-body-md text-body-md text-on-surface-variant text-sm">Level 38 •
                                    Crimson</span>
                            </div>
                        </div>
                        <button
                            class="bg-transparent border border-primary-container text-primary-container font-label-bold text-label-bold px-sm py-xs rounded hover:bg-primary-container hover:text-on-primary-container transition-colors active:scale-95">JOIN</button>
                    </div>
                </div>
            </div>
            <!-- Faction Leaderboard (Full width) -->
            <div class="glass-card rounded-xl p-lg md:col-span-12 flex flex-col gap-md">
                <div
                    class="flex flex-col md:flex-row justify-between items-start md:items-center gap-sm border-b border-white/5 pb-sm">
                    <h3
                        class="font-label-bold text-label-bold text-on-surface tracking-widest uppercase flex items-center gap-sm">
                        <span class="material-symbols-outlined text-secondary text-sm">emoji_events</span>
                        Faction Ranks
                    </h3>
                    <!-- Tabs -->
                    <div class="flex bg-surface-container-highest rounded p-[2px]">
                        <button
                            class="px-md py-xs font-label-bold text-label-bold text-xs rounded bg-surface-container text-on-surface shadow-sm transition-all">LOCAL
                            (KUNINGAN)</button>
                        <button
                            class="px-md py-xs font-label-bold text-label-bold text-xs rounded text-on-surface-variant hover:text-on-surface transition-all">GLOBAL</button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-sm">
                    <!-- Rank 1 -->
                    <div
                        class="bg-surface-container/40 border border-primary-container/20 rounded-lg p-md flex flex-col items-center gap-sm relative">
                        <div class="absolute top-2 left-2 text-primary-container font-metric-xl text-xl opacity-50">#1
                        </div>
                        <div
                            class="w-12 h-12 rounded-full border-2 border-primary-container shadow-[0_0_10px_rgba(0,245,255,0.4)] overflow-hidden">
                            <img class="w-full h-full object-cover"
                                data-alt="Abstract digital silhouette of a figure rendered in glowing blue data streams against a pitch black background. The style is highly technical and modern, representing a top-tier digital athlete in a cyber-grid universe."
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuBQWFhb8QnTEM9Bu4_DatNro8P17IQkfn90Tpm7d-OlEMLOUjLicEEo_P5zxsEigEWzFrycKXwbUTtKTAAzvSWQiQCwO5TshTSdvIaMCxWXOjYHyY6yzwnjU4z5EqrvKQvV2ml09AeP15qptF2JHKIRV_C1R80LamjVxsRtqWPbVaZns2lifvtEm1CdM6ErQ0jwvXU4J5psp7myO4eXJqvpCwtMWwv-GtlEznLK_T8mwrMjRe_8cIxT_EHdq2l-KYPGFZlBBIvyu_4" />
                        </div>
                        <span class="font-headline-md text-headline-md text-on-surface text-center">Neon_Ghost</span>
                        <span class="font-metric-xl text-metric-xl text-primary-container text-2xl mt-sm">12,450 <span
                                class="text-xs text-on-surface-variant font-body-md">PTS</span></span>
                        <div class="w-full h-1 bg-surface-container-highest rounded-full mt-2 overflow-hidden">
                            <div class="h-full bg-primary-container w-[90%]"></div>
                        </div>
                    </div>
                    <!-- Rank 2 -->
                    <div
                        class="bg-surface-container/40 border border-error/20 rounded-lg p-md flex flex-col items-center gap-sm relative">
                        <div class="absolute top-2 left-2 text-error font-metric-xl text-xl opacity-50">#2</div>
                        <div
                            class="w-12 h-12 rounded-full border-2 border-error shadow-[0_0_10px_rgba(255,180,171,0.4)] bg-surface-container-high flex items-center justify-center text-error font-headline-md">
                            X
                        </div>
                        <span class="font-headline-md text-headline-md text-on-surface text-center">Xeno_Blaze</span>
                        <span class="font-metric-xl text-metric-xl text-error text-2xl mt-sm">11,200 <span
                                class="text-xs text-on-surface-variant font-body-md">PTS</span></span>
                        <div class="w-full h-1 bg-surface-container-highest rounded-full mt-2 overflow-hidden">
                            <div class="h-full bg-error w-[75%]"></div>
                        </div>
                    </div>
                    <!-- Rank 3 -->
                    <div
                        class="bg-surface-container/40 border border-tertiary-fixed/20 rounded-lg p-md flex flex-col items-center gap-sm relative">
                        <div class="absolute top-2 left-2 text-tertiary-fixed font-metric-xl text-xl opacity-50">#3
                        </div>
                        <div
                            class="w-12 h-12 rounded-full border-2 border-tertiary-fixed shadow-[0_0_10px_rgba(255,225,108,0.4)] overflow-hidden">
                            <img class="w-full h-full object-cover grayscale contrast-150 brightness-75"
                                data-alt="Close up of high-tech athletic gear illuminated by stark yellow neon lighting in a dark void. The material looks synthetic and advanced, perfectly capturing the aesthetic of a connected runner in a gamified environment."
                                src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9FoRo1HpImO36OHSvyBa0Vnup_wUJVMtPcEolQS2gUbrnBRUDKJipB5e3aiO7Xy-3pSv5d-WvQfsUPsiAOus0dBY-roupua707goGNPHnnGovrS23r72d7xhiE4B4cYJqtARNrBDq7JSv2GaxKu5ksoOz8EXKPZAP3RgZDq6HcQ-fOGN6oGtPZP3Han3WQahUaHcgVXuaRxJhKx21jf0uy0ahT4zSM6jWBED0v_VmQYxlQ_s7ZCZbdZANclzR1PegsCj3-HidbII" />
                        </div>
                        <span class="font-headline-md text-headline-md text-on-surface text-center">Aura_Volt</span>
                        <span class="font-metric-xl text-metric-xl text-tertiary-fixed text-2xl mt-sm">10,850 <span
                                class="text-xs text-on-surface-variant font-body-md">PTS</span></span>
                        <div class="w-full h-1 bg-surface-container-highest rounded-full mt-2 overflow-hidden">
                            <div class="h-full bg-tertiary-fixed w-[60%]"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- BottomNavBar Shared Component -->
    <nav
        class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center pb-6 pt-3 px-4 bg-zinc-950/90 backdrop-blur-md border-t border-cyan-500/40 rounded-t-xl shadow-[0_-10px_30px_rgba(0,245,255,0.1)]">
        <!-- Map (Inactive) -->
        <button
            class="flex flex-col items-center text-zinc-600 opacity-60 hover:opacity-100 active:scale-90 transition-all duration-150">
            <span class="material-symbols-outlined text-2xl">explore</span>
            <span class="font-space-grotesk text-[10px] font-bold uppercase tracking-tighter mt-1">Map</span>
        </button>
        <!-- Social (Active) -->
        <button
            class="flex flex-col items-center text-cyan-400 drop-shadow-[0_0_10px_rgba(0,245,255,0.8)] hover:opacity-100 active:scale-90 transition-all duration-150">
            <span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">groups</span>
            <span class="font-space-grotesk text-[10px] font-bold uppercase tracking-tighter mt-1">Social</span>
        </button>
        <!-- Profile (Inactive) -->
        <button
            class="flex flex-col items-center text-zinc-600 opacity-60 hover:opacity-100 active:scale-90 transition-all duration-150">
            <span class="material-symbols-outlined text-2xl">person</span>
            <span class="font-space-grotesk text-[10px] font-bold uppercase tracking-tighter mt-1">Profile</span>
        </button>
    </nav>
</body>

</html>
